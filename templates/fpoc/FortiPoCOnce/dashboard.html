<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
    <title>PoC Dashboard</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
          integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
</head>

<body>
<main role="main">
    <div class="d-flex flex-column flex-md-row align-items-center p-3 px-md-4 mb-3 bg-white border-bottom shadow-sm">
        <h2 class="my-0 mr-md-auto font-weight-normal">
            Dashboard
        </h2>
    </div>
</main>

<div class="container">

    <!--    <div class="row">-->
    <!--      <div class="p-3 mb-2 bg-info text-white">WEST REGION</div>-->
    <!--    </div>-->

    {% for device in devices %}
    <br>
    <div class="row">
        <div class="col">
            {{device.name}}
            [<a href="{{device.URL.1}}" target="_blank">{{device.URL.0}}</a>]
            [<a href="{{device.console}}" target="_blank">console</a>]
        </div>
    </div>
    {% endfor %}

</html>
