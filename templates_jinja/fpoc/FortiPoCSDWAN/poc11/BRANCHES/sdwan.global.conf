###############################################################################################################
# SD-WAN

{% extends "./sdwan.conf" %} {# shared jinja variables for SDWAN #}
{% block myconfig %}

##### SD-WAN zones -----------------------------------------------

config system sdwan
    set status enable
    config zone
        edit "INTERNET"
        next
        edit "SIA"
        next
        edit "VPN"
        next
    end
end

##### SD-WAN members -----------------------------------------------

config system sdwan
    config members

        # Underlays
        edit 1
            set interface "{{wan.inet1.name}}"
            {{ "set gateway %s.254"%(wan.inet1.subnet) if not wan.inet1.dhcp }}
            set zone "INTERNET"
        next
        edit 2
            set interface "{{wan.inet2.name}}"
            {{ "set gateway %s.254"%(wan.inet2.subnet) if not wan.inet2.dhcp }}
            set zone "INTERNET"
        next

        # SSE PoPs
        edit 11
            set interface "SSE_POP1"
            set zone "SIA"
            set source {{lan.ip}}
            set priority 10
        next
        edit 12
            set interface "SSE_POP2"
            set zone "SIA"
            set source {{lan.ip}}
            set priority 10
        next

        # Overlays
        {% for member in ipsec_overlays %}
            {% if member.cross_underlay and not full_mesh_ipsec %}
                {% continue %}
            {% endif %}
            edit {{member.id}}
                set interface "{{member.interface}}"
                set zone "VPN"
                {{ "set source %s"%(loopback) if overlay == 'no_ip' }}
                set priority 20
                set status {{member.status}}
                set transport-group {{member.transport_group}}
                {{ "set priority-in-sla %d"%(member.priority_in_sla) if bidir_sdwan_bgp_priority == 'remote_sla_priority' }}
                {{ "set priority-out-sla %d"%(member.priority_out_sla) if bidir_sdwan_bgp_priority == 'remote_sla_priority' }}
            next
        {% endfor %}
    end
end

### SD-WAN health-checks -----------------------------------------------

{# Build the list of SLA members for each health-check #}

{# members for SLA_VPN #}
{% set sla_dc_members = [] -%} {# Must contain all overlay tunnels #}
{% for ov in ipsec_overlays -%}
    {% if ov.cross_underlay and not full_mesh_ipsec -%}
        {% continue -%}
    {% endif -%}

    {% do sla_dc_members.append(ov.id) -%}
{% endfor -%}

config system sdwan
    config health-check
        edit "SLA_VPN"
            set server 10.200.{{region_id}}.254
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            set mos-codec g729
            set probe-timeout 1000
            set members {{ sla_dc_members|join(' ') }}
            {{ "set embed-measured-health enable" if bidir_sdwan_bgp_priority in ('remote_sla_metrics', 'remote_sla_priority', 'remote_sla_status') }}
            {{ "set sla-id-redistribute 1"  if bidir_sdwan_bgp_priority in ('remote_sla_priority', 'remote_sla_status') }}
            config sla
                edit 1
                    set link-cost-factor latency packet-loss
                    set latency-threshold 150
                    set packetloss-threshold 1
                next
                edit 2
                    set link-cost-factor mos
                    set mos-threshold "4.0"
                next
            end
        next
    end
end

{# members for SLA_Internet if there is Hub RIA = Internet underlays + Tunnels if RIA #}

{% set sla_internet_members = [1, 2] -%}  {# Internet_1 and Internet_2 #}

{% for ov in ipsec_overlays -%} {# Add tunnels for RIA #}
    {% if 'MPLS' in ov.interface -%}
        {% do sla_internet_members.append(ov.id) -%}
    {% endif -%}
    {% if ov.cross_underlay and not full_mesh_ipsec -%}
        {% continue -%}
    {% endif -%}
{% endfor -%}

config system sdwan
    config health-check
        edit "SLA_Internet"
            set server "198.18.8.8"
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            set probe-timeout 1000
            set members 1 2
            config sla
                edit 1
                    set link-cost-factor latency jitter packet-loss
                    set latency-threshold 150
                    set jitter-threshold 30
                    set packetloss-threshold 2
                next
                edit 2
                    set link-cost-factor latency jitter packet-loss
                    set latency-threshold 300
                    set jitter-threshold 50
                    set packetloss-threshold 5
                next
            end
        next
    end
end

config system sdwan
    config health-check
        edit "SLA_SIA"
            set server "198.19.9.9"
            set protocol http
            set http-get "/vpntest"
            set interval 1000
            set probe-timeout 1000
            set failtime 10
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            set members 11 12
            config sla
                edit 1
                    set link-cost-factor latency jitter packet-loss
                    set latency-threshold 350
                    set jitter-threshold 100
                    set packetloss-threshold 5
                next
            end
        next
    end
end

### SD-WAN with ADVPN v2.0 -----------------------------------------------

config system sdwan
    config zone
        edit "VPN"
            set advpn-select enable
            set advpn-health-check "SLA_VPN"
        next
    end
end

### SD-WAN rules -----------------------------------------------

# --- Rules to DataCenters

{% include "./sdwan.rules.DC.East.conf" %}      {# region == 'East' #}
{% include "./sdwan.rules.DC.West.conf" %}      {# region == 'West' #}

# --- Rules to Branches

config system sdwan
    config service
        edit 4
            set name "Branches_VoiP_MOS"
            set mode sla
            set protocol 17
            set start-port 5061
            set end-port 5061
            set dst "Corporate"
            set src "Corporate"
            # set hold-down-time 20
            config sla
                edit "SLA_VPN"
                    set id 2
                next
            end
            set priority-members 133 111 122 233 211 222
            # No need for fib-best-match for Branch-to-Branch rules with ADVPNv2
            #  Traffic remains in the original session path if the path is within the SLA
            set sla-stickiness enable
        next
        edit 5
            set name "Branches"
            set mode sla
            set dst "Corporate"
            set src "Corporate"
            # set hold-down-time 20
            config sla
                edit "SLA_VPN"
                    set id 1
                next
            end
            set priority-members 111 122 133 211 222 233
        next
    end
end

# --- Internet rules

# rules 10 and 11 (DIA) leverage AppCtrl routing while rule 12 (SSE RIA) as no AppCtrl
# During learning phase, rules 10+11 cannot be matched which means learning traffic hits rule 12
# and is sent out via SSE PoP members 11 or 12 (depending on SLA conditions)
# learning traffic will hit firewall policy 2 (Internet for DIA+RIA) which has AppCtrl enabled
# and therefore allows to populate 5-tuple for appctrl isdb cache
# subsequent traffic to dstip-dport in appctrl cache can hit sdwan rules 10+11 and can be sent out the DIA members
#
config system sdwan
    config service
        edit 10
            set name "Internet_DIA_1"
            set mode sla
            set src "Corporate"
            set internet-service enable
            set internet-service-app-ctrl 16354
            config sla
                edit "SLA_Internet"
                    set id 1
                next
            end
            set priority-members 1 2
        next
        edit 11
            set name "Internet_DIA_2"
            set mode sla
            set src "Corporate"
            set internet-service enable
            set internet-service-app-ctrl 33182 41468 16920 {{ "7930" if region == 'West' }}
            config sla
                edit "SLA_Internet"
                    set id 2
                next
            end
            set priority-members 1 2
        next
        edit 12
            set name "Internet"
            set mode sla
            set src "Corporate"
            set dst "Internet"
            config sla
                edit "SLA_SIA"
                    set id 1
                next
                edit "SLA_Internet"
                    set id 2
                next
            end
            set priority-members 11 12 1 2
        next
    end
end

{% endblock %}

