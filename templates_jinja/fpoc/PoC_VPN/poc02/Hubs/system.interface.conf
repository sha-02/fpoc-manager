# Internet and OOB management interfaces

config system interface
    edit "{{wan.inet1.port}}" {# for VLANs this is the parent interface ; for non-vlans this is the physical interface #}
        {{ "set speed "~wan.inet1.speed if wan.inet1.speed }}
    next
    edit "{{wan.inet1.name}}"
        set vdom "root"
        set mode static
        set ip {{wan.inet1.ipmask}}
        {% if wan.inet1.vlanid %}
            set type vlan
            set interface "{{wan.inet1.port}}"
            set vlanid {{wan.inet1.vlanid}}
        {% else %}
            set alias "Internet-1"
        {% endif %}
        set allowaccess ping
        set role wan
    next
    edit "{{wan.inet2.port}}" {# for VLANs this is the parent interface ; for non-vlans this is the physical interface #}
        {{ "set speed "~wan.inet2.speed if wan.inet2.speed }}
    next
    edit "{{wan.inet2.name}}"
        set vdom "root"
        set mode static
        set ip {{wan.inet2.ipmask}}
        {% if wan.inet2.vlanid %}
            set type vlan
            set interface "{{wan.inet2.port}}"
            set vlanid {{wan.inet2.vlanid}}
        {% else %}
            set alias "Internet-2"
        {% endif %}
        set allowaccess ping
        set role wan
    next
    edit "{{lan.port}}"
        set vdom "root"
        set mode static
        set ip {{lan.ip}} {{lan.mask}}
        set allowaccess ping
        set alias "LAN"
        {{ "set speed "~lan.speed if lan.speed }}
    next
end

{% if routing == 'ibgp' and overlay == 'unnumbered' %}
# BGP on unnumbered tunnel = BGP on loopback interface with the loopback IP@ exchanged with exchange-interface-ip
config system interface
    edit "lo-BGP"
        set vdom "root"
        set ip 192.168.255.254 255.255.255.255
        set allowaccess ping
        set type loopback
        set role wan
    next
end
{% endif %}