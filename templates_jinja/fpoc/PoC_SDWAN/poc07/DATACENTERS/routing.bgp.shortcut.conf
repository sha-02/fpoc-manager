{% extends "./routing.bgp.conf" %} {# shared jinja variables needed for BGP #}
{% block bgp_shortcut %}

# dynamic BGP peerings between Hub in one region with the Branches of the remote region (eBGP peering)
# Only advertise local DC subnets, do not re-advertise any other prefixes (aggregates, ...)
# simple solution done here: tag local LAN with 32768 when injected with 'redistribute' command and only allow sending
# prefixes with this tag over shortcuts

# ASN range [65001-65254] - # regexp generated by https://3widgets.com/
# set regexp "(6500[1-9]|650[1-9][0-9]|651[0-9]{2}|652[0-4][0-9]|6525[0-4])"
config router aspath-list
    edit "ASN_REGIONS"
        config rule
            edit 1
                set action permit
                set regexp "6500[1-9]"
            next
        end
    next
end

# match any prefix within the global BGP loopback summary (10.200.0.0/16)
config router prefix-list
    edit "BGP_LOOPBACK_PREFIXES"
        config rule
            edit 1
                set prefix 10.200.0.0 255.255.0.0
                set ge 17
                set le 32
            next
        end
    next
end

# Only advertise local subnets (connected) or learned via an IGP or BGP
# Idea is therefore to:
# - 10: deny any RFC1918 summary
# - 20: deny all prefixes learned over the overlays (BGP NH within 10.200.0.0/16)
# - 30: deny the regional BGP summaries 10.200.{{region}}.0/24 (prefix within 10.200.0.0/16)
# - 40: allow all other prefixes but marking them as 'no-advertise' since the remote spoke can use them but not
#       re-advertise these eBGP-learned prefixes to any peer (eg, to its iBGP Hubs or to its iBGP intra-regional shortcuts)
config router route-map
    edit "ADVPN_REGIONS_OUT"
        set comments "Deny RFC1918 summaries (tag 1918) and prefixes or BGP NH from within the global BGP loopback summary"
        config rule
            edit 10
                set action deny
                set match-tag 1918
            next
            edit 20
                set action deny
                set match-ip-nexthop "BGP_LOOPBACK_PREFIXES"
            next
            edit 30
                set action deny
                set match-ip-address "BGP_LOOPBACK_PREFIXES"
            next
            edit 40
                set set-community "no-advertise"
            next
        end
    next
end

config router bgp
    config neighbor-group
        edit "ADVPN_REGIONS"
# passive enable = let the peer from remote region initiate the BGP session, Hubs are passive for inter-regional branch-to-remoteHub shortcuts
            set description "Peering over inter-regional ADVPN shortcuts"
            set passive enable
            set remote-as-filter ASN_REGIONS
            set interface "lo-BGP"
            set update-source "lo-BGP"
            set ebgp-enforce-multihop enable
            set advertisement-interval 1
            set soft-reconfiguration enable
            set capability-graceful-restart enable
            set next-hop-self enable
            set route-map-out "ADVPN_REGIONS_OUT"
        next
    end
    config neighbor-range
        edit 2
            set prefix 10.200.0.0 255.255.0.0
            set neighbor-group "ADVPN_REGIONS"
        next
    end
end

{% endblock %} {# end of extension of 'router.bgp.conf' #}
