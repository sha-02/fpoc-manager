{% if vrf_segmentation %}
# Update Firewall Policies for VRFs

# zone regrouping all LAN VRFs for overlay/corporate traffic
{% set zone_members = [] -%}
{% for segment in vrf_segments.values() -%}
    {% do zone_members.append(segment.name) -%}
{% endfor -%}

config system zone
    edit "LAN"
        set description "LAN-facing side of the CE VRFs"
        set interface {{zone_members|join(' ')}}
    next
end

{% if dia or sia %}

    # zone regrouping all lanVRF-wanVRF links terminated on the WAN VRF
    {% set zone_members = [] -%}
    {% for name, vrflink_endpoints in inter_segments.items() -%}
        {% if vrflink_endpoints.1.vrfid != vrf_wan %}
            {% do zone_members.append(name+'0') -%}
        {% endif %}
    {% endfor -%}

    config system zone
        edit "LAN_"
            set description "LAN-facing side of the Internet VRF"
            set interface {{zone_members|join(' ')}}
        next
    end

    config firewall policy
        edit 5
            set name "Internet (VRF)"
            set srcintf "LAN"
            set dstintf "INTERNET_"
            set action accept
            set srcaddr "Corporate"
            set dstaddr "Internet"
            set schedule "always"
            set service "ALL"
            set logtraffic disable
        next
        {% if ria_only %}
        move 5 before 4 {# before the Internet(RIA) rule #}
        {% else %}
        move 5 after 1  {# after the 'Deny Internet' rule #}
        {% endif %}

        {% if dia or sia %}
        edit 1 {# "Deny Internet" #}
            set srcintf "LAN_"
        next
        {% endif %}

        {% if dia %}
        edit 2  {# "Internet (DIA)" #}
            set srcintf "LAN_"
        next
        {% endif %}

        {% if sia %}
        edit 3  {# "Internet (SIA)" #}
            set srcintf "LAN_"
        next
        {% endif %}
    end
{% endif %} {# DIA/SIA #}

{% endif %} {# vrf_segmentation #}
