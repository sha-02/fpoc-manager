{% if multicast %}
###############################################################################################################
# Multicast

config system settings
    set multicast-forward disable
    set multicast-ttl-notchange enable
    set gui-multicast-policy enable
end

# Inter-Regional tunnels

{% set edge_tunnels = [ 'EDGE_INET1', 'EDGE_INET2', 'EDGE_MPLS' ] %}

{% if region_id == 1 %}
    {% set regional_tunnels = [ 'EAST1_INET1', 'EAST1_INET2', 'EAST1_MPLS' ] %}
{% else %} {# East region #}
    {% set regional_tunnels = [ 'WEST1_INET1', 'WEST1_INET2', 'WEST1_MPLS', 'WEST2_INET1', 'WEST2_INET2', 'WEST2_MPLS' ] %}
{% endif %}

# PIM-SM is enabled on:
# - port5 because this is where the mcast senders are located
# - lo-BGP because it is where the RP address is defined
# - Edge tunnels towards the Branches
# - the inter-regional tunnels because inter-regional multicast is allowed

config router multicast
    set multicast-routing enable
    config interface
        edit "lo-BGP"
            set pim-mode sparse-mode
        next
        edit "{{lan.port}}"
            set pim-mode sparse-mode
            set passive enable
            config igmp
                set access-group "multicast-groups"
            end
        next
        {% if vrf_segmentation %}
            {% for vrf_name in vrf_segments.keys() %}
                edit "lo-RP-{{vrf_name}}"
                    set pim-mode sparse-mode
                next
            {% endfor %}
            {% for segment in vrf_segments.values() %}
                edit "{{segment.name}}"
                    set pim-mode sparse-mode
                    set passive enable
                    config igmp
                        set access-group "multicast-groups"
                    end
                next
            {% endfor %}
        {% endif %}
        {% for edge_tunnel in edge_tunnels %}
            edit "{{edge_tunnel}}"
                set pim-mode sparse-mode
                {{ "set update-source lo-BGP" if overlay == 'no_ip' }}
            next
        {% endfor %}
        {% for regional_tunnel in regional_tunnels %}
            edit "{{regional_tunnel}}"
                set pim-mode sparse-mode
                {{ "set update-source lo-BGP" if overlay == 'no_ip' }}
            next
        {% endfor %}
    end
end

config firewall multicast-policy
    edit 1
        set name "permit all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
    next
end

# Each DC is rendez-vous point for a set of multicast groups
# WEST-DC1 for mcast groups in 239.1.1.0/24
# WEST-DC2 for mcast groups in 239.1.2.0/24
# EAST-DC1 for mcast groups in 239.2.1.0/24
# The generic convention is 239.<region-id>.(dc-number).0/24

config router multicast

    {% if not vrf_segmentation %}
    {% if vrf_pe == 0 %}
    # Must use "pim-sm-global" for VRF 0 because "edit 0" in "pim-sm-global-vrf" creates an new entry instead of entry for VRF 0
    config pim-sm-global
    {% else %} {# vrf_pe<>0 #}
    config pim-sm-global-vrf
    edit {{vrf_pe}}
    {% endif %} {# vrf_pe == 0 #}
        config rp-address
            edit 1
                set ip-address {{rendezvous_points['WEST-DC1']}}
                set group "multicast-west-dc1"
            next
            edit 2
                set ip-address {{rendezvous_points['WEST-DC2']}}
                set group "multicast-west-dc2"
            next
            edit 3
                set ip-address {{rendezvous_points['EAST-DC1']}}
                set group "multicast-east-dc1"
            next
        end
    end
    {% if vrf_pe != 0 %}
    end
    {% endif %} {# vrf_pe<>0 #}
    {% endif %} {# vrf_segmentation #}

    {% if vrf_segmentation %}
    config pim-sm-global-vrf
        edit {{vrf_blue}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['WEST-DC1']}}
                    set group "multicast-blue"
                next
            end
        next
        edit {{vrf_yellow}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['WEST-DC2']}}
                    set group "multicast-yellow"
                next
            end
        next
        edit {{vrf_red}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['EAST-DC1']}}
                    set group "multicast-red"
                next
            end
        next
    end
    {% endif %}

{% endif %} {# multicast #}
