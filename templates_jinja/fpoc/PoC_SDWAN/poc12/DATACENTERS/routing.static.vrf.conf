{% if vrf_segmentation %}
# Update static routes for VRFs

# Default route for the local CE VRFs (DIA) and remote CE VRFs (RIA for Branches) (index = 100+x)
{# Jinja namespace is used due to the scope of variables in Jinja 'for' loops #}
{# Inspired from: https://stackoverflow.com/questions/4870346/can-a-jinja-variables-scope-extend-beyond-in-an-inner-block #}
{% set route = namespace(index=100) %}
config router static
    {% for segment in vrf_segments.values() %} {# for each VRF of each vrf_segments #}
        edit {{route.index}}
            set distance 1
            set comment "VRF {{segment.vrfid}} ({{segment.alias}}) default-route for Internet"
            set sdwan-zone "INTERNET"
            set vrf {{segment.vrfid}}
        next

        {% set route.index = route.index + 1 %}
    {% endfor %}
end

# Corporate summaries for CE VRFs (index=10+x)
# Advertise global RFC1918 LAN summaries for each VRF
# A 'tag' is applied so that it can be used during redistribution of static routes into BGP

config router static
{% for segment in vrf_segments.values() %}
    edit {{10+loop.index0}}     {# The first route with ID 10 purposely overrides the static route ID 10 created in 'routing.static.conf' #}
        set dstaddr "Corporate"
        set blackhole enable
        set vrf {{segment.vrfid}}
        set comment "Corporate summary for VRF {{segment.vrfid}} ({{segment.alias}})"
        set tag 1918
        {{ "set distance 1" if segment.vrfid == vrf_grey }}
    next
{% endfor -%}
end

{% endif %} {# VRF segmentation #}
