{% if vrf_segmentation %}
# Update FW addresses and groups for VRFs

# zone regrouping all LAN VRFs for overlay/corporate traffic
{% set zone_members = [] -%}
{% for segment in vrf_segments.values() -%}
    {% do zone_members.append(segment.name) -%}
{% endfor -%}

config system zone
    edit "LAN"
        set description "LAN segments"
        set interface {{zone_members|join(' ')}}
    next
end

{% if multicast %}
    config firewall policy
        edit 1000
            set name "BGP SDWAN.HC PIM"
            set srcintf "any"
            set dstintf "any"
            set srcaddr "all"
            append dstaddr "lo-RP"
            set comments "BGP peerings. SDWAN health-checks. PIM adj"
        next
    end
{% endif %}

#
# Inter-VRF traffic
# - Internet DIA: local VRFs BLUE/YELLOW/RED to Internet
# - Internet RIA: Branch VRFs BLUE/YELLOW/RED to Internet
# - Branches/Regions (in VRFs BLUE/YELLOW/RED) -> WEST-EXT (in VRF GREY)
#
# srcintf in FW policy is in CE VRF while dstintf is in WAN VRF: this will create cross-vrf sessions
# "skip-vrf-match" is a required for cross-VRF sessions
# this setting allows to skip VRF matching when matching session on reply direction
config firewall policy
    edit 2  {# "Internet" #}
        set skip-vrf-match enable
    next
    {% if ria %}
    edit 3  {# "VPN -> Internet (RIA)" #}
        set skip-vrf-match enable
    next
    {% endif %}
    edit 11  {# "EGDE -> DC" #}
        set skip-vrf-match enable
    next
    edit 12  {# "REGIONS -> DC" #}
        set skip-vrf-match enable
    next
end

{% endif %} {# VRF segmentation #}