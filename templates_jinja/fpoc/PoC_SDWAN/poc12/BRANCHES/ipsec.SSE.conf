{% if sia %}
{% for pop in range(1,3) %} {# 2 POPs #}
config vpn ipsec phase1-interface
    edit "SSE_POP{{pop}}"
        set interface "{{wan.inet1.name if pop==1 else wan.inet2.name}}"
        set ike-version 2
        set peertype any
        set net-device disable
        set proposal aes128-sha1
        set localid "{{name}}"
        set dpd on-idle
        set dhgrp 2
        set transport udp
        set remote-gw 198.19.{{pop}}.1
        set psksecret fortinet
    next
end

config system interface
    edit "SSE_POP{{pop}}"
          set vrf {{vrf_wan}}
          set mtu-override enable
          set mtu 1458
          set tcp-mss 1418
          set preserve-session-route enable
          set monitor-bandwidth enable
    next
end

config vpn ipsec phase2-interface
    edit "SSE_POP{{pop}}"
        set phase1name "SSE_POP{{pop}}"
        set proposal null-md5
        set pfs disable
        set keepalive enable
    next
end
{% endfor %}
{% endif %} {# SIA #}