{% if multicast %}

{% if not vrf_segmentation %} {################################################################################}
# Each DC is rendez-vous point for a multicast group subnet
# WEST-DC1 for mcast groups in 239.1.1.0/24
# WEST-DC2 for mcast groups in 239.1.2.0/24
# EAST-DC1 for mcast groups in 239.2.1.0/24
# The generic convention is 239.<region-id>.(dc-number).0/24

{% set wdc1 = "239.1.1.0" %}
{% set wdc2 = "239.1.2.0" %}
{% set edc1 = "239.2.1.0" %}
config router access-list
    edit "multicast-groups"
        config rule
            edit 1
                set prefix {{wdc1}} 255.255.255.0
            next
            edit 2
                set prefix {{wdc2}} 255.255.255.0
            next
            edit 3
                set prefix {{edc1}} 255.255.255.0
            next
        end
    next
    edit "multicast-west-dc1"
        config rule
            edit 1
                set prefix {{wdc1}} 255.255.255.0
            next
        end
    next
    edit "multicast-west-dc2"
        config rule
            edit 1
                set prefix {{wdc2}} 255.255.255.0
            next
        end
    next
    edit "multicast-east-dc1"
        config rule
            edit 1
                set prefix {{edc1}} 255.255.255.0
            next
        end
    next
end

{% endif %} {# no vrf_segmentation #}

{% if vrf_segmentation %} {################################################################################}
# Each DC is rendez-vous point for a multicast group subnet in a specific VRF
# WEST-DC1 for mcast in VRF blue
# WEST-DC2 for mcast in VRF yellow
# EAST-DC1 for mcast in VRF red

{% set blue = "239.%s.%s.%s"%(vrf_blue,vrf_blue,vrf_blue) %}
{% set yellow = "239.%s.%s.%s"%(vrf_yellow,vrf_yellow,vrf_yellow) %}
{% set red = "239.%s.%s.%s"%(vrf_red,vrf_red,vrf_red) %}
config router access-list
    edit "multicast-groups"
        config rule
            edit 1
                set prefix {{blue}} 255.255.255.0
            next
            edit 2
                set prefix {{yellow}} 255.255.255.0
            next
            edit 3
                set prefix {{red}} 255.255.255.0
            next
        end
    next
    edit "multicast-blue"
        config rule
            edit 1
                set prefix {{blue}} 255.255.255.0
            next
        end
    next
    edit "multicast-yellow"
        config rule
            edit 1
                set prefix {{yellow}} 255.255.255.0
            next
        end
    next
    edit "multicast-red"
        config rule
            edit 1
                set prefix {{red}} 255.255.255.0
            next
        end
    next
end

{% endif %} {# vrf_segmentation #}

{% endif %} {# multicast #}