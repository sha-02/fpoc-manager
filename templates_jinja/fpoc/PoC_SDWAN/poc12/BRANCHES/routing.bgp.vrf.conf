{% if vrf_segmentation %}
# BGP updates for VRF
#
# VRF {{vrf_pe}} is used as PE VRF to carry vpnv4 prefixes for the CE VRFs
# For VPNv4 RT we DO NOT use the local ASN, we use 65000 for all devices from all regions
#
# Direct Internet access:
#
# WAN VRF {{vrf_wan}} contains the Internet underlays (say, Inet1 and Inet2) and default routes over these interfaces
# CE VRFs must send their traffic via the WAN VRF to access the Internet
# It requires:
# 1- configuring a static default-route in each CE VRF using Inet1/Inet2 as egress interfaces (VRF leak)
# 2- configure the DIA policy in VRF WAN to skip-vrf-match
#

{%- set dc1 = datacenter.first -%}
{%- set dc2 = datacenter.second -%}

# Dynamic BGP (shortcuts)

config router bgp
    config neighbor-group
        edit {{"ADVPN_"~region|upper}}
            set next-hop-self-vpnv4 enable
            set soft-reconfiguration-vpnv4 enable
            set capability-graceful-restart-vpnv4 enable
        next
        edit "ADVPN_REGIONS"
            set next-hop-self-vpnv4 enable
            set soft-reconfiguration-vpnv4 enable
            set capability-graceful-restart-vpnv4 enable
            set route-map-out-vpnv4 "ADVPN_REGIONS_OUT"
        next
    end
end

# Regional Hubs

config router bgp
    config neighbor
        edit "{{dc1.loopback}}"
            set next-hop-self-vpnv4 enable
            set soft-reconfiguration-vpnv4 enable
            set capability-graceful-restart-vpnv4 enable
        next
        edit "{{dc2.loopback}}"
            set next-hop-self-vpnv4 enable
            set soft-reconfiguration-vpnv4 enable
            set capability-graceful-restart-vpnv4 enable
        next
    end
end

# Advertise CE VRFs => simply add the CE VRF LAN interfaces to the LAN_INTERFACES route-map

config router route-map
    edit "LAN_INTERFACES"
        config rule
            {% for name, segment in vrf_segments.items() %}
                {% if name != "LAN" %}  {# skip the LAN interface since it is already defined in the RM #}
                    edit "{{10+loop.index0}}"
                        set match-interface "{{segment.alias}}"
                        set set-tag 32768
                    next
                {% endif %}
            {% endfor %}
        end
    next
end

# VRFs: declare PE and CE VRFs

config router bgp
    config vrf
        edit "{{vrf_pe}}"
            set role pe
        next
        {% for segment in vrf_segments.values() %}
            {% if segment.vrfid != vrf_pe %}
                edit "{{segment.vrfid}}"
                    set role ce
                    set rd "{{loopback}}:{{segment.vrfid}}"
                    set export-rt "65000:{{segment.vrfid}}"
                    set import-rt "65000:{{segment.vrfid}}"
                next
            {% endif %}
        {% endfor %}
    end
end

{% endif %} {# VRF segmentation #}
