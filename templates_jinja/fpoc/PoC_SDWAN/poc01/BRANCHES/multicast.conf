{% if multicast %}
###############################################################################################################
# Multicast

config system settings
    set multicast-forward disable
    set multicast-ttl-notchange enable
    set gui-multicast-policy enable
end

# the LAN (port5) is limited to accept IGMP join for only these groups

{% set tunnels = [ 'H1_INET1', 'H1_INET2', 'H1_MPLS', 'H2_INET1', 'H2_INET2', 'H2_MPLS' ] %}

{% if full_mesh_ipsec %} {# Add cross-underlay IPsec tunnels #}
    {% set tunnels = tunnels + [ 'H1_INET1X2', 'H1_INET2X1', 'H2_INET1X2', 'H2_INET2X1' ] %}
{% endif %}


config router multicast
    set multicast-routing enable

    {% if not vrf_segmentation %} {# ################### No VRF segmentation ############# #}

    config pim-sm-global
        # Control local-out PIM with an SD-WAN rule
        set pim-use-sdwan enable

    {% if vrf_pe == 0 %}
    # Must use "pim-sm-global" for VRF 0 because "edit 0" in "pim-sm-global-vrf" creates an new entry instead of an entry for VRF 0
    {% else %} {# vrf_pe<>0 #}
    end
    config pim-sm-global-vrf
    edit {{vrf_pe}}
    {% endif %} {# vrf_pe == 0 #}

        config rp-address
            edit 1
                set ip-address {{rendezvous_points['WEST-DC1']}}
                set group "multicast-west-dc1"
            next
            edit 2
                set ip-address {{rendezvous_points['WEST-DC2']}}
                set group "multicast-west-dc2"
            next
            edit 3
                set ip-address {{rendezvous_points['EAST-DC1']}}
                set group "multicast-east-dc1"
            next
        end
    end

    {% if vrf_pe != 0 %}
    end
    {% endif %} {# vrf_pe<>0 #}
    {% endif %} {# vrf_segmentation #}

    {% if vrf_segmentation %} {# ################### With VRF segmentation ############# #}
    config pim-sm-global
        # Control local-out PIM with an SD-WAN rule
        set pim-use-sdwan enable
    end
    config pim-sm-global-vrf
        edit {{vrf_blue}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['WEST-DC1']}}
                    set group "multicast-blue"
                next
            end
        next
        edit {{vrf_yellow}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['WEST-DC2']}}
                    set group "multicast-yellow"
                next
            end
        next
        edit {{vrf_red}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['EAST-DC1']}}
                    set group "multicast-red"
                next
            end
        next
    end
    {% endif %}

    config interface
        edit "{{lan.port}}"
            set pim-mode sparse-mode
            set passive enable
            config igmp
                set access-group "multicast-groups"
            end
        next
        {% if vrf_segmentation %}
        {% for segment in vrf_segments.values() %}
            edit "{{segment.name}}"
                set pim-mode sparse-mode
                set passive enable
                config igmp
                    set access-group "multicast-groups"
                end
            next
        {% endfor %}
        {% endif %}
        {% for tunnel in tunnels %}
            edit "{{tunnel}}"
                set pim-mode sparse-mode
                {{ "set update-source lo-BGP" if overlay == 'no_ip' }}
            next
        {% endfor %}
    end
end

config firewall multicast-policy
    edit 1
        set name "permit all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
    next
end

{% endif %} {# multicast #}