{% if vrf_segmentation and (dia or sia) and not npu %}
# FortiGate model with no NPU ASIC: software vdom-link is used for inter-vrf traffic.
# inter-vrf interfaces needed to allow DIA/SIA for the CE VRFs

config system vdom-link
{% for name in inter_segments %}
    edit "{{name}}"
        set type ethernet
    next
{% endfor %}
end
{% endif %} {# vrf_segmentation and not npu and DIA/SIA #}

{% if vrf_segmentation and (dia or sia) and npu %}
# FortiGate model with NPU ASIC running a FOS version which allows using npu-vlink without the need to enable VDOMs
config system global
    set single-vdom-npuvlink enable
end
{% endif %} {# vrf_segmentation and npu and DIA/SIA #}

