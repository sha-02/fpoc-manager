{% extends "./sdwan.conf" %} {# shared jinja variables for SDWAN #}
{% block myconfig %}

{% if vrf_segmentation %}
# static route updates for VRF

{#-------------------------------  DIA/SIA ----------------------------------------------------------------------- #}
{% if dia or sia %}
# Default route for the CE VRFs => DIA+SIA via the inter-vrf link to reach the Internet/WAN VRF (index = 10+x)

config router static
    {% for name, isegs in inter_segments.items() %}
        edit {{10+loop.index0}}
            set device "{{name}}1"
            set gateway {{isegs[0].ip}}
            # same distance as the SD-WAN default-route
            set distance 1
            set comment "VRF-{{isegs[1].vrfid}} default-route for Internet Access (DIA+SIA)"
        next
    {% endfor %}
end
{% endif %} {# DIA/SIA #}

{#-------------------------------  RIA only -------------------------------------------------------------------- #}
{% if ria_only %}
# Since we are doing RIA for CE VRFs, we cannot use an sdwan default route: FOS refuses to create another default static
# route over a tunnel if there exists an sdwan static route over "INTERNET" zone
# So we need to :
# - delete the existing sdwan static route (ID 2)
# - create dedicated static default routes over each internet underlay (ID 10 & 11)
# - create dedicated static default routes over each overlay (ID 100+x)

# Delete sdwan static route
config router static
    delete 2
end

# Default route over internet underlays (index = 10 & 11)

config router static
    edit 10
        set device "{{wan.inet1.name}}"
        {% if wan.inet1.dhcp %}
            set dynamic-gateway enable
        {% else %}
            set gateway {{wan.inet1.subnet}}.254
        {% endif %}
        set priority 1
        set comment "VRF-{{vrf_wan}} default-route for Direct Internet Access (DIA)"
    next
    edit 11
        set device "{{wan.inet2.name}}"
        {% if wan.inet2.dhcp %}
            set dynamic-gateway enable
        {% else %}
            set gateway {{wan.inet2.subnet}}.254
        {% endif %}
        set priority 1
        set comment "VRF-{{vrf_wan}} default-route for Direct Internet Access (DIA)"
    next
end

# Default routes over the tunnels (index = 100+x)
{# Jinja namespace is used due to the scope of variables in Jinja 'for' loops #}
{# Inspired from: https://stackoverflow.com/questions/4870346/can-a-jinja-variables-scope-extend-beyond-in-an-inner-block #}
{% set route = namespace(index=100) %}
config router static
    {% for seg in vrf_segments.values() %} {# for each VRF of each vrf_segments #}

        {% for overlay in ipsec_overlays %}
            {% if overlay.cross_underlay and not full_mesh_ipsec %}
                {% continue %}
            {% endif %}

            edit {{route.index}}
                set device "{{overlay.interface}}"
                set vrf {{seg.vrfid}}
                set distance 1
                set comment "VRF-{{seg.vrfid}} default-route for Remote Internet Access (RIA)"
            next

            {% set route.index = route.index + 1 %}
        {% endfor %}
    {% endfor %}
end

{% endif %} {# RIA only #}

{% endif %} {# VRF segmentation #}
{% endblock %}
