{% if vrf_segmentation %}
# Update Firewall Policies for VRFs

# zone regrouping all LAN VRFs for overlay/corporate traffic
{% set zone_members = [] -%}
{% for segment in vrf_segments.values() -%}
    {% do zone_members.append(segment.name) -%}
{% endfor -%}

config system zone
    edit "LAN"
        set description "LAN segments"
        set interface {{zone_members|join(' ')}}
    next
end

#
# Inter-vrf Traffic
#
# srcintf in FW policy is in CE VRF while dstintf is in WAN VRF: this will create cross-vrf sessions
# "skip-vrf-match" is a required for cross-VRF sessions
# this setting allows to skip VRF matching when matching session on reply direction
config firewall policy
    {% if dia %}
    edit 2  {# Internet DIA #}
        set skip-vrf-match enable
    next
    {% endif %}
    {% if sia %}
    edit 3  {# Internet SIA #}
        set skip-vrf-match enable
    next
    {% endif %}
end

{% endif %} {# VRF segmentation #}
