{% extends "./sdwan.conf" %} {# shared jinja variables for SDWAN #}
{% block myconfig %}

{% if vrf_segmentation and (dia or sia) %}
# SDWAN updates for VRFs

{% set zone_members = [] -%}
{% for name in inter_segments.keys() -%}
    {% do zone_members.append(name+'1') -%}
{% endfor -%}

config system zone
    edit "INTERNET_"
        set interface {{zone_members|join(' ')}}
    next
end

{% if sia %}
config system sdwan
    config members
        # SSE_POPs are in PE VRF so the 'source' must be an address in this VRF
        edit 11
            set source {{loopback}}
        next
        edit 12
            set source {{loopback}}
        next
    end
end
{% endif %} {# SIA #}

{% endif %} {# VRF segmentation with DIA/SIA #}
{% endblock %}
