###############################################################################################################

##### SD-WAN zones -----------------------------------------------

config system sdwan
    set status enable
    config zone
        edit "INTERNET"
        next
        edit "BRANCHES"
        next
        edit "VPN"
        next
    end
end

##### SD-WAN members -----------------------------------------------

{# the dict key is the region_id #}
{% set vpn_members = {
    1: [
        { 'id': 10, 'interface': 'H1H2', 'zone': 'VPN' },
        { 'id': 11, 'interface': 'EAST1_INET1', 'zone': 'VPN', 'transport_group': 1 },
        { 'id': 12, 'interface': 'EAST1_INET1X2', 'zone': 'VPN', 'transport_group': 1, 'full_mesh_ipsec': true },
        { 'id': 22, 'interface': 'EAST1_INET2', 'zone': 'VPN', 'transport_group': 1 },
        { 'id': 21, 'interface': 'EAST1_INET2X1', 'zone': 'VPN', 'transport_group': 1, 'full_mesh_ipsec': true },
        { 'id': 33, 'interface': 'EAST1_MPLS', 'zone': 'VPN', 'transport_group': 2 },
        ],
    2: [
        { 'id': 111, 'interface': 'WEST1_INET1', 'zone': 'VPN', 'transport_group': 1 },
        { 'id': 112, 'interface': 'WEST1_INET1X2', 'zone': 'VPN', 'transport_group': 1, 'full_mesh_ipsec': true },
        { 'id': 122, 'interface': 'WEST1_INET2', 'zone': 'VPN', 'transport_group': 1 },
        { 'id': 121, 'interface': 'WEST1_INET2X1', 'zone': 'VPN', 'transport_group': 1, 'full_mesh_ipsec': true },
        { 'id': 133, 'interface': 'WEST1_MPLS', 'zone': 'VPN', 'transport_group': 2 },
        { 'id': 211, 'interface': 'WEST2_INET1', 'zone': 'VPN', 'transport_group': 1 },
        { 'id': 212, 'interface': 'WEST2_INET1X2', 'zone': 'VPN', 'transport_group': 1, 'full_mesh_ipsec': true },
        { 'id': 222, 'interface': 'WEST2_INET2', 'zone': 'VPN', 'transport_group': 1 },
        { 'id': 221, 'interface': 'WEST2_INET2X1', 'zone': 'VPN', 'transport_group': 1, 'full_mesh_ipsec': true },
        { 'id': 233, 'interface': 'WEST2_MPLS', 'zone': 'VPN', 'transport_group': 2 },
        ]
    }
%}

config system sdwan
    config members
        edit 1
            set interface "EDGE_INET1"
            set zone "BRANCHES"
        next
        edit 2
            set interface "EDGE_INET2"
            set zone "BRANCHES"
        next
        edit 3
            set interface "EDGE_MPLS"
            set zone "BRANCHES"
        next
        edit 4
            set interface "{{wan.inet1.name}}"
            {{ "set gateway %s.254"%(wan.inet1.subnet) if not wan.inet1.dhcp }}
            set zone "INTERNET"
        next
        edit 5
            set interface "{{wan.inet2.name}}"
            {{ "set gateway %s.254"%(wan.inet2.subnet) if not wan.inet2.dhcp }}
            set zone "INTERNET"
        next
        {% for member in vpn_members[region_id] %}
            {% if not member.full_mesh_ipsec|default(false) or full_mesh_ipsec == member.full_mesh_ipsec|default(false) %}
            edit {{member.id}}
                set interface {{member.interface}}
                set zone {{member.zone}}
                set transport-group {{member.transport_group|default(0)}}
            next
            {% endif %}
        {% endfor %}
    end
end

### SD-WAN health-checks -----------------------------------------------

config system sdwan
    config health-check
        edit "SLA_Internet"
            set server "198.18.8.8"
            set vrf {{vrf_wan}}
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            set members 4 5
            config sla
                edit 1
                    set latency-threshold 150
                    set jitter-threshold 30
                    set packetloss-threshold 2
                next
            end
        next
        edit "SLA_EDGE"
            set detect-mode remote
            # no VRF is required for 'remote' HC since no probes is actually generated

            # failtime * remote-probe-timeout = amount of time (in ms) the hub waits, without receiving SLA probes,
            # before switching the link to dead state
            # We recommend to nullify 'failtime' by setting it to 1
            set remote-probe-timeout 1000
            set failtime 1

            # interval = how often (milliseconds) the hub checks the status of the health check.
            # To avoid potential false-positives, it is set to 250ms which is 1/4 of the remote-probe-timeout
            # so 4 remote-sla must be missing for the spoke to be considered dead
            # Do not set below 200ms in large environments – can cause CPU issues.
            set interval 250
            # interval * recoverytime = amount of time (in ms) the hub waits, upon receiving SLA probes,
            # before switching back the link to alive state
            # Here,  10 seconds (250ms * 40)
            # It is recommended to set a recovery time higher than the desired convergence time to avoid route flaps
            set recoverytime 40

            # When all SLA health-check members for a Spoke are in dead state, the corresponding BGP prefixes are
            # marked as suppressible. Suppressible BGP prefixes can be matched by a route-map where they can be
            # suppressed (BGP withdrawn) or their BGP attributes can be changed (MED, AS-Path,...)
            set update-bgp-route enable

            set sla-id-redistribute 1
            set members 1 2 3
            config sla
                edit 1
                    set link-cost-factor remote
                    # sets the highest priority (lowest preference) when no remote-sla is received from Branch
                    # This does not override the spoke’s advertised priority. As long as the spoke’s probes are received,
                    # the Hub will always use whatever value the spoke tells it to.
                    set priority-out-sla 65535
                next
            end
        next
        {% if ipv6 %}
            edit "SLAv6_EDGE"
                set addr-mode ipv6
                set detect-mode remote
                set remote-probe-timeout 1000
                set failtime 1
                set interval 250
                set recoverytime 40
                set update-bgp-route enable
                set sla-id-redistribute 1
                set members 1 2 3
                config sla
                    edit 1
                        set link-cost-factor remote
                        set priority-out-sla 65535
                    next
                end
            next
        {% endif %}
    end
end

### SD-WAN with ADVPN v2.0 -----------------------------------------------

config system sdwan
    config health-check
        delete "Default_DNS"
        delete "Default_Office_365"
        delete "Default_Gmail"
        delete "Default_Google Search"
        delete "Default_FortiGuard"
        # For cross-regional branch-to-remoteRegionHub shortcuts
        edit "SLA_VPN"
            set server {{ "10.200.2.254" if region_id == 1 else "10.200.1.254" }}
            set vrf {{vrf_pe}}
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            {{ "set vrf "~vrf_pe if vrf_segmentation }}
            set source {{ "10.200.1.254" if region_id == 1 else "10.200.2.254" }}
            {% if full_mesh_ipsec %}
                set members {{ "11 12 22 21 33" if region_id == 1 else "111 112 122 121 133 211 212 222 221 233" }}
            {% else %}
                set members {{ "11 22 33" if region_id == 1 else "111 122 133 211 222 233" }}
            {% endif %}
            config sla
                edit 1
                    set latency-threshold 150
                    set jitter-threshold 30
                    set packetloss-threshold 2
                next
            end
        next
        {% if ipv6 %}
            edit SLAv6_VPN
                set addr-mode ipv6
                set server {{ "10.200.2.254"|ipv4_to_ipv6 if region_id == 1 else "10.200.1.254"|ipv4_to_ipv6 }}
                set sla-fail-log-period 10
                set sla-pass-log-period 10
                {{ "set vrf "~vrf_pe if vrf_segmentation }}
                set source6 {{ "10.200.1.254"|ipv4_to_ipv6 if region_id == 1 else "10.200.2.254"|ipv4_to_ipv6 }}
                {% if full_mesh_ipsec %}
                    set members {{ "11 12 22 21 33" if region_id == 1 else "111 112 122 121 133 211 212 222 221 233" }}
                {% else %}
                    set members {{ "11 22 33" if region_id == 1 else "111 122 133 211 222 233" }}
                {% endif %}
                config sla
                    edit 1
                        set latency-threshold 150
                        set jitter-threshold 30
                        set packetloss-threshold 2
                    next
                end
            next
        {% endif %}
    end
    config zone
        edit "VPN"
            set advpn-select enable
            set advpn-health-check "SLA_VPN"
        next
    end
end

### SD-WAN rules -----------------------------------------------

config system sdwan
    config service
        #
        # HUB->BR SDWAN steering to intra-regional Branches
        #
        # Multiple ECMP BGP routes with priorities can exist to reach a Branch
        # We can use sd-wan rules to select whichever overlay we want to use
        # When an overlay is bad, its priority gets increased and this route/overlay is no longer eligible due to 'fib-best-match'
        # The combination of 'fib-best-match' and 'BGP priorities' provide same result as 'mode sla' rule with active probes
        edit 19
            set name "EDGE_VoIP"
            set mode manual
#            set src "DataCenters"
            set src "Corporate"
            set dst "Corporate"
            set protocol 17
            set start-port 5061
            set end-port 5061
            set priority-members 3 1 2
            set tie-break fib-best-match
        next
        edit 20
            set name "EDGE"
            set mode manual
#            set src "DataCenters"
            set src "Corporate"
            set dst "Corporate"
            set priority-members 1 2 3
            set tie-break fib-best-match
        next
        {% if ipv6 %}
            edit 25
                set name "EDGE_6"
                set addr-mode ipv6
                set mode manual
                set src6 "Corporate"
                set dst6 "Corporate"
                set priority-members 1 2 3
                set tie-break fib-best-match
            next
        {% endif %}
        #
        # inter-regional steering: LAN->HUB->HUB->BR or BR->HUB->HUB->LAN
        #
        edit 21
            set name "VPN"
            set mode sla
            set src "Corporate"
            set dst "Corporate"
            config sla
                edit "SLA_VPN"
                    set id 1
                next
            end
            set priority-zone "VPN"
        next
        {% if ipv6 %}
            edit 26
                set name "VPN_6"
                set addr-mode ipv6
                set mode sla
                set src6 "Corporate"
                set dst6 "Corporate"
                config sla
                    edit "SLAv6_VPN"
                        set id 1
                    next
                end
                set priority-zone "VPN"
            next
        {% endif %}
        #
        # Internet steering: DIA from DC itself or RIA from Branches
        #
        edit 30
            set name "Internet"
            set mode sla
            set src "Corporate"
            # Restrict the dst to 'Internet' ('all' minus RFC1918 subnets) (defined in bootstrap config)
            # to ensure that this rule never catch anything else that traffic for Internet
            set dst "Internet"
            config sla
                edit "SLA_Internet"
                    set id 1
                next
            end
            set priority-members 4 5
        next
    end
end
