{% if vrf_segmentation %}
# Update static routes for VRFs

# Corporate summaries for CE VRFs
# Advertise global RFC1918 LAN summaries for each VRF
# A 'tag' is applied so that it can be used during redistribution of static routes into BGP

config router static
{% for segment in vrf_segments.values() %}
    edit {{10+loop.index0}}     {# The first route with ID 10 purposely overrides the static route ID 10 created in 'routing.static.conf' #}
        set dstaddr "Corporate"
        set blackhole enable
        set vrf {{segment.vrfid}}
        set comment "Corporate summary for VRF {{segment.vrfid}} ({{segment.alias}})"
        set tag 1918
    next
{% endfor -%}
end

{% if ipv6 %}
    # "set capability-default-originate6 enable" only sends the default route in the PE VRF, not the CE VRFs
    # So I'm using static blackhole default-route to send it inside each CE VRF
    # tag 1918 is kept since it is matched by EDGE_OUT route-map
    config router static6
    {% for segment in vrf_segments.values() %}
        edit {{10+loop.index0}}
            set blackhole enable
            set vrf {{segment.vrfid}}
            set comment "Default route as Corporate summary for VRF {{segment.vrfid}} ({{segment.alias}})"
            set tag 1918
        next
    {% endfor -%}
    end
{% endif %}

# Default routes for Internet access of the CE VRFs via the inter-vrf links to reach the Internet/WAN VRF

config router static
{% for name, isegs in inter_segments.items() %}
    edit {{20+loop.index0}}
        set device "{{name}}1"
        set gateway {{isegs[0].ip}}
        # same distance as the SD-WAN default-route
        set distance 1
        set comment "VRF-{{isegs[1].vrfid}} default-route for Internet access"
    next
{% endfor %}
end

{% endif %} {# vrf_segmentation #}

