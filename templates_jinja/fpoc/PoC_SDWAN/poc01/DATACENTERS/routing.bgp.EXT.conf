{% extends "./routing.bgp.conf" %} {# shared jinja variables needed for BGP #}
{% block bgp_core %}
{% if region_id == 1 %}

config router route-map
    edit "CORE_OUT"
        set comments "Suppress all routes towards a spoke whose links are all dead"
        config rule
            edit 10
                set match-suppress enable
                set action deny
            next
            edit 20
            next
        end
    next
end

config router route-map
    edit "SET_LAN_TAG"
        set comments "Tag as local LAN with tag 32768"
        config rule
            edit 1
                set set-tag 32768
            next
        end
    next
end

{% if FOS>=8_000_000 and vrf_segmentation %}
    {% set interface_to_EXT = vrf_segments['GREY'] %}
{% else %}
    {% set interface_to_EXT = lan %}  {# LAN_BLUE #}
{% endif %}

# "set attribute-unchanged med": keep MED when advertising to an eBGP peer
config router bgp
    config neighbor
        edit "{{interface_to_EXT.network|ipaddr('-2')|ipaddr('address')}}"  {# Last IP in the LAN subnet #}
            {{ "set name WEST-EXT" if FOS>=8_000_000 }}
            set description "Peering to WEST-EXT"
            {{ "set activate6 disable" if not ipv6 }}
            set activate-vpnv4 disable
            set activate-vpnv6 disable
            set activate-evpn disable
            set advertisement-interval 1
            set soft-reconfiguration enable
            set capability-graceful-restart enable
            # set route-map-in "SET_LAN_TAG"
            set route-map-out "CORE_OUT"
            {% if ipv6 %}
                set soft-reconfiguration6 enable
                set capability-graceful-restart6 enable
                # set route-map-in6 "SET_LAN_TAG"
                set route-map-out6 "CORE_OUT"
            {% endif %}
            set attribute-unchanged med
            set connect-timer 1
            set remote-as 65003
            set interface "{{interface_to_EXT.name}}"
            set update-source "{{interface_to_EXT.name}}"
        next
    end
end

{% endif %} {# region_id == 1 #}
{% endblock %} {# end of extension of 'router.bgp.conf' #}