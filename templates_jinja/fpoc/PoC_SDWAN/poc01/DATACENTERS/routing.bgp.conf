{# This file is used to share jinja variables needed for BGP between the different BGP template files #}
{# 'extends' statement is used in the other BGP templates to access these common variables #}

{%- set local_ASN  = 65000 + region_id -%}

{# BGP static neighbors between Hubs within the same region and between regions #}
{% if region_id == 1 -%}
    {% set neighbors = [{'ip': '10.200.1.251', 'name': 'WEST-DC1', 'asn': 65001, 'dc_id': 2},
                        {'ip': '10.200.1.252', 'name': 'WEST-DC2', 'asn': 65001, 'dc_id': 1},
                        {'ip': '10.200.2.251', 'name': 'EAST-DC1', 'asn': 65002}
                        ] %}
{% else %}
    {% set neighbors = [{'ip': '10.200.1.251', 'name': 'WEST-DC1', 'asn': 65001},
                        {'ip': '10.200.1.252', 'name': 'WEST-DC2', 'asn': 65001}
                        ] %}
{% endif -%}

{# BGP configuration from other jinja templates #}
{% block bgp_edge %}
{% endblock %}

{% block bgp_shortcut %}
{% endblock %}

{% block bgp_core %}
{% endblock %}

{% block bgp_region %}
{% endblock %}

{% block bgp_vrf %}
{% endblock %}
