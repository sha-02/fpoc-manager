{% if vrf_segmentation %}
# Interface updates for VRF

{% set wan_underlays = [ wan.inet1, wan.inet2,  wan.mpls1 ] %}

# WAN interfaces and Loopbacks
config system interface
    {% for underlay in wan_underlays %}
        edit "{{underlay.name}}"
            set vrf {{vrf_wan}}
        next
    {% endfor %}
    edit "lo-HC"
        set vrf {{vrf_pe}}
    next
    edit "lo-BGP"
        set vrf {{vrf_pe}}
    next
    {% if multicast %}
    # Loopback interfaces for Rendez-vous points in each VRF
    {% for vrf_name, vrf in vrf_segments.items() %}
        edit "lo-RP-{{vrf_name}}"
            set vdom "root"
            set vrf {{vrf.vrfid}}
            set ip {{loopback_RP}} 255.255.255.255
            set allowaccess ping
            set type loopback
            set role wan
        next
    {% endfor %}
    {% endif %}
end

# LAN interfaces for the CE VRFs
config system interface
    {% for segment in vrf_segments.values() %}
        edit "{{segment.name}}"
            set vdom "root"
            {% if segment.vlanid %}
                set type vlan
                set interface "{{segment.port}}"
                set vlanid {{segment.vlanid}}
            {% else %}
                set alias "{{segment.alias}}"
            {% endif %}
            set vrf {{segment.vrfid}}
            set ip {{segment.ipmask}}
            set allowaccess ping
            {% if ipv6 %}
                config ipv6
                    set ip6-address {{segment.ipmask|ipv4_to_ipv6}}
                    set ip6-allowaccess ping
                end
            {% endif %}
            set role lan
        next
    {% endfor %}
end

# DHCP servers for VRF LAN segments

config system dhcp server
    {% for segment in vrf_segments.values() %}
        edit {{10+loop.index0}}
            set interface {{segment.name}}
            set default-gateway {{ segment.ip }}
            set netmask {{ segment.mask }}
            set lease-time 3600
            set dns-service default
            set ntp-service default
            config ip-range
                edit 1
                    set start-ip {{ segment.network | ipmath(7) }} {# A single IP is allocated #}
                    set end-ip {{ segment.network | ipmath(7) }}
                next
            end
        next
    {% endfor %}
end

{% if FOS < 8_000_000 %} {# FOS 7.6 #}
# Inter-VRF interfaces over vdom-link

{# Jinja namespace is used due to the scope of variables in Jinja 'for' loops #}
{# Inspired from: https://stackoverflow.com/questions/4870346/can-a-jinja-variables-scope-extend-beyond-in-an-inner-block #}
{% set npuvlink_vlanid = namespace(loop=1000) %} {# only used if npu on the FGT #}

config system interface
    {% for name, isegs in inter_segments.items() -%}
        {% for segment in isegs %}
            edit "{{name}}{{loop.index0}}"
                set vdom "root"
                set vrf {{segment.vrfid}}
                set ip {{segment.ip}} {{segment.mask}}
                set allowaccess ping

                {{ "set interface npu0_vlink%s"%(loop.index0) if npu }}
                {{ "set vlanid %d"%(npuvlink_vlanid.loop) if npu }}
            next
        {% endfor %}

        {% set npuvlink_vlanid.loop = npuvlink_vlanid.loop + 1 %}
    {% endfor -%}
end
{% endif %} {# FOS 7.6 #}

{% endif %} {# VRF segmentation #}
