{% if vrf_segmentation %}
# Update FW addresses and groups for VRFs

config firewall address
    {% for segment in vrf_segments.values() %}
        edit "{{segment.alias}}"
            set subnet {{segment.network}}
            set allow-routing enable
        next
    {% endfor %}
end

{# Build a list of all LAN segments fw addresses #}
{% set all_lans = [] -%}
{% for segment in vrf_segments.values() %}
    {% do all_lans.append(segment.alias) -%}
{% endfor %}

config firewall addrgrp
    edit "gLAN"
        set member {{ all_lans|join(' ') }}
    next
end
{% endif %} {# VRF segmentation #}
