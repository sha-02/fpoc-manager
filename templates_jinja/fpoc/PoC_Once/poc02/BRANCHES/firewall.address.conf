###############################################################################################################
# FW addresses and groups

config firewall address
    edit "lo-BGP"
        set subnet {{loopback}} 255.255.255.255
    next
    edit "lo-BGP-global-summary"
        set subnet 10.200.0.0 255.255.0.0
    next
#     edit "DC-12"
#         set subnet 10.12.0.0 255.255.255.0
#     next
    edit "LAN"
        set subnet {{lan.network}}
        set allow-routing enable
    next
end

# config firewall addrgrp
#     edit "DataCenters"
#         set member "DC-12"
#     next
# end

config firewall address6
    edit "Corporate"
        set ip6 2000:10::/32
    next
    edit "lo-BGP"
        set ip6 {{loopback|ipv4_to_ipv6}}/128
    next
    edit "lo-BGP-global-summary"
        set ip6 2000:10:200::/48
    next
end