{% if multicast %}
###############################################################################################################
# Multicast

config system settings
    set multicast-forward disable
    set multicast-ttl-notchange enable
    set gui-multicast-policy enable
end

# the LAN (port5) is limited to accept IGMP join for only these groups

{% set tunnels = [ 'VPN_INET1', 'VPN_INET2', 'VPN_INET3' ] %}

{% if full_mesh_ipsec %} {# Add cross-underlay IPsec tunnels #}
    {% set tunnels = tunnels + [ 'VPN_INET1X2', 'VPN_INET2X1' ] %}
{% endif %}


config router multicast
    set multicast-routing enable
    config pim-sm-global-vrf
        edit {{vrf_voice}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['HUB1']}}
                    set group "multicast-voice"
                next
            end
        next
        edit {{vrf_video}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['HUB2']}}
                    set group "multicast-video"
                next
            end
        next
    end
    config interface
        edit "{{lan.port}}"
            set pim-mode sparse-mode
            set passive enable
            config igmp
                set access-group "multicast-groups"
            end
        next
        {% for segment in vrf_segments.values() %}
            edit "{{segment.name}}"
                set pim-mode sparse-mode
                set passive enable
                config igmp
                    set access-group "multicast-groups"
                end
            next
        {% endfor %}
        {% for tunnel in tunnels %}
            edit "{{tunnel}}"
                set pim-mode sparse-mode
                {{ "set update-source lo-BGP" if overlay == 'no_ip' }}
            next
        {% endfor %}
    end
end

config firewall multicast-policy
    edit 1
        set name "permit all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
    next
end
{% endif %}