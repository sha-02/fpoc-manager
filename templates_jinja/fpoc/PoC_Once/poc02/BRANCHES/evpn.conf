{% if evpn %}
#
# EVPN config between BR1<->BR2 and between BR3<->BR4
#

{% if region_id == 1 %}
    {% set evpnid = 10 %}
    {% set subnet = "10.12.0" %}
{% else %} {# region2 #}
    {% set evpnid = 20 %}
    {% set subnet = "10.34.0" %}
{% endif %}

{% set vlanid = branch_id * 100 %}
{% set asn = 65000 + region_id %}
{% set l2vni = 100000 + evpnid %}


# BR1 and BR2 must have the same location-id to guarantee symmetric reply from the Hub at SA level for EVPN_XTD
# config system settings
#     set location-id 10.200.123.123
# end
# --> Not needed
# In order to deal with the natural IRB asymmetry caused by traffic flow routed to/from an EVPN, we must :
# - create FW policies for traffic in/out the L2VNI with tcp-without-syn (for TCP)
#     . For UDP is works because there is a policy for each direction
# - enable 'asymroute-icmp' in system.settings otherwise PING fails
#     . PING, like TCP, has a direction (echo-request and echo-response) so FGT refuses to see the echo-response
#       if it did not have an existing session created by the echo-request.

config system settings
    set tcp-session-without-syn enable
    set asymroute-icmp enable
end

config system interface
    edit "LAN_XTD"
        set vdom "root"
        set interface "port5"
        set vlanid {{vlanid}}
    next
end

config system evpn
    edit {{evpnid}}
        set import-rt "{{asn}}:{{l2vni}}"
        set export-rt "{{asn}}:{{l2vni}}"
        set ip-local-learning enable
        set arp-suppression enable
    next
end

config system vxlan
    edit "VxLAN_XTD"
        set interface "lo-BGP"
        set vni {{l2vni}}
        set evpn-id {{evpnid}}
    next
end

config system switch-interface
    edit "EVPN_XTD"
        set vdom "root"
        set member "LAN_XTD" "VxLAN_XTD"
        set intra-switch-policy explicit
    next
end

{% set gw_ip = 1 %}   {# last-byte of the GW IP #}
{% if not evpn_anycast_gw %}
    {% set gw_ip = branch_id %}   {# last-byte of the GW IP #}
{% endif %}
config system interface
    edit "EVPN_XTD"
        set ip {{subnet}}.{{gw_ip}} 255.255.255.0
        set allowaccess ping
        set vrf {{vrf_evpn}}
    next
end

config router route-map
    edit "LAN_INTERFACES"
        config rule
            edit 0
                set match-interface "EVPN_XTD"
           next
        end
    next
end

config router bgp
    config neighbor
        edit "10.200.{{region_id}}.251"
            set capability-graceful-restart-evpn enable
            set soft-reconfiguration-evpn enable
        next
    end
    config neighbor-group
        edit "ADVPN_INTRA_REGION"
            set activate-evpn disable
        next
        edit "ADVPN_INTER_REGION"
            set activate-evpn disable
        next
    end
end

config firewall policy
#     edit 10 {# Corporate Out -- Layer3 #}
#         append srcintf "EVPN_XTD"
#     next
#     edit 11 {# Corporate In -- Layer3 #}
#         append dstintf "EVPN_XTD"
#     next
    edit 20  {# Layer2 EVPN #}
        set name "L2VNI_{{l2vni}}"
        set srcintf "LAN_XTD" "VxLAN_XTD"
        set dstintf "LAN_XTD" "VxLAN_XTD"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic disable
        set global-label "EVPN"
    next
    edit 21
        set name "L3EVPN IN"
        set srcintf "EVPN_XTD"
#         set dstintf "LAN" "VPN"
        set dstintf "VPN"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic disable
        set anti-replay disable
        set tcp-session-without-syn all
    next
    edit 22
        set name "L3EVPN OUT"
        set dstintf "EVPN_XTD"
#         set srcintf "LAN" "VPN"
        set srcintf "VPN"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic disable
        set anti-replay disable
        set tcp-session-without-syn all
    next
end

{% endif %} {# evpn #}
