{% if multicast %}
config router access-list
    edit "multicast-groups"
        config rule
            edit 1
                set prefix 239.{{vrf_voice}}.{{vrf_voice}}.0 255.255.255.0
            next
            edit 2
                set prefix 239.{{vrf_video}}.{{vrf_video}}.0 255.255.255.0
            next
        end
    next
    edit "multicast-voice"
        config rule
            edit 1
                set prefix 239.{{vrf_voice}}.{{vrf_voice}}.0 255.255.255.0
            next
        end
    next
    edit "multicast-video"
        config rule
            edit 1
                set prefix 239.{{vrf_video}}.{{vrf_video}}.0 255.255.255.0
            next
        end
    next
end
{% endif %}