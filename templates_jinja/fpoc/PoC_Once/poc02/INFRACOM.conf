config router access-list
    edit "multicast-groups"
        config rule
            edit 1
                set prefix 239.{{vrf_voice}}.{{vrf_voice}}.0 255.255.255.0
            next
            edit 2
                set prefix 239.{{vrf_video}}.{{vrf_video}}.0 255.255.255.0
            next
        end
    next
    edit "multicast-voice"
        config rule
            edit 1
                set prefix 239.{{vrf_voice}}.{{vrf_voice}}.0 255.255.255.0
            next
        end
    next
    edit "multicast-video"
        config rule
            edit 1
                set prefix 239.{{vrf_video}}.{{vrf_video}}.0 255.255.255.0
            next
        end
    next
end

{% set igmp_interfaces = ['LAN_VOICE', 'LAN_VIDEO'] %}
{% set pim_interfaces = ['HUB1_VOICE', 'HUB2_VIDEO'] %}

config router multicast
    set multicast-routing enable
    config pim-sm-global-vrf
        edit {{vrf_voice}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['HUB1']}}
                    set group "multicast-voice"
                next
            end
        next
        edit {{vrf_video}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['HUB2']}}
                    set group "multicast-video"
                next
            end
        next
    end
    config interface
        {% for intf in igmp_interfaces %}
        edit "{{intf}}"
            set pim-mode sparse-mode
            set passive enable
            config igmp
                set access-group "multicast-groups"
            end
        next
        {% endfor %}
        {% for intf in pim_interfaces %}
        edit "{{intf}}"
            set pim-mode sparse-mode
        next
        {% endfor %}
    end
end

config firewall multicast-policy
    edit 1
        set name "permit all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
    next
end

{% endif %} {# multicast #}