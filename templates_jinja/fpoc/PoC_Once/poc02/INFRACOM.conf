config system global
    set admin-https-redirect disable
    set admin-lockout-duration 10
    set admin-lockout-threshold 10
    set admin-scp enable
    set admintimeout 480
    set gui-app-detection-sdwan enable
    set gui-auto-upgrade-setup-warning disable
    set gui-display-hostname enable
    set hostname "INFRACOM"
    set lldp-reception enable
    set lldp-transmission enable
    set timezone "Europe/Paris"
    set gui-theme eclipse
    set gui-ipv6 enable
end

config system settings
    set multicast-forward disable
    set multicast-ttl-notchange enable
    set gui-multicast-policy enable
    set gui-allow-unnamed-policy enable
    set gui-multiple-interface-policy enable
end

config system alias
    edit "rib"
        set command "get router info routing-table all"
    next
    edit "rib_database"
        set command "get router info routing-table database"
    next
    edit "fib"
        set command "get router info kernel"
    next
    edit "bgp_summary"
        set command "get router info bgp summary"
    next
    edit "bgp_network"
        set command "get router info bgp network"
    next
    edit "bgp_rib"
        set command "get router info routing-table bgp"
    next
    edit "rib6"
        set command "get router info6 routing-table"
    next
    edit "rib6_database"
        set command "get router info6 routing-table database"
    next
    edit "fib6"
        set command "get router info6 kernel"
    next
    edit "proute6"
        set command "diag firewall proute6 list"
    next
    edit "bgp_summary6"
        set command "get router info6 bgp summary"
    next
    edit "bgp_network6"
        set command "get router info6 bgp network"
    next
    edit "bgp_rib6"
        set command "get router info6 routing-table bgp"
    next
    edit "pim_interface"
        set command "get router info multicast pim sparse-mode interface"
    next
    edit "pim_neighbor"
        set command "get router info multicast pim sparse-mode neighbor"
    next
    edit "pim_bsr"
        set command "get router info multicast pim sparse-mode bsr-info"
    next
    edit "pim_rp"
        set command "get router info multicast pim sparse-mode rp-mapping"
    next
    edit "pim_nh"
        set command "get router info multicast pim sparse-mode next-hop"
    next
    edit "pim_table_voice"
        set command "get router info multicast pim sparse-mode table 239.11.11.11"
    next
    edit "pim_table_video"
        set command "get router info multicast pim sparse-mode table 239.12.12.12"
    next
    edit "igmp_interface"
        set command "get router info multicast igmp interface"
    next
    edit "igmp_groups"
        set command "get router info multicast igmp groups"
    next
    edit "igmp_limit"
        set command "diagnose ip multicast get-igmp-limit"
    next
    edit "mcast_status"
        set command "diag ip multicast status"
    next
    edit "mcast_table"
        set command "get router info multicast table"
    next
    edit "mcast_tablecount"
        set command "get router info multicast table-count"
    next
    edit "mcast_route"
        set command "diag ip multicast mroute"
    next
    edit "mcast_vif"
        set command "diag ip multicast vif"
    next
    edit "mcast_vif"
        set command "diag ip multicast vif"
    next
    edit "mcast_group_membership"
        set command "diag ip multicast group-membership"
    next
end

config system interface
    edit "lo-BGP"
        set vdom "root"
        set ip 10.200.3.251 255.255.255.255
        set allowaccess ping
        config ipv6
            set ip6-address 2000:10:200:3::251/128
            set ip6-allowaccess ping
        end
        set type loopback
        set role wan
    next
    edit "port5"
        set vdom "root"
        set vrf {{vrf_data}}
        set ip 10.0.10.1 255.255.255.0
        set allowaccess ping
        config ipv6
            set ip6-address 2000:10:0:10::1/64
            set ip6-allowaccess ping
        end
        set alias "LAN_DATA"
    next
end

{% set vlans = [
    {'name': 'LAN_VOICE', 'vrf': vrf_voice, 'ipmask': '10.0.11.1 255.255.255.0', 'parent': 'port5', 'vlanid': 56},
    {'name': 'LAN_VIDEO', 'vrf': vrf_video, 'ipmask': '10.0.12.1 255.255.255.0', 'parent': 'port5', 'vlanid': 57},
    {'name': 'HUB1_DATA', 'vrf': vrf_data, 'ipmask': '192.168.1.10 255.255.255.254', 'parent': 'port1', 'vlanid': 15},
    {'name': 'HUB1_VOICE', 'vrf': vrf_voice, 'ipmask': '192.168.1.13 255.255.255.254', 'parent': 'port1', 'vlanid': 16},
    {'name': 'HUB1_VIDEO', 'vrf': vrf_video, 'ipmask': '192.168.1.15 255.255.255.254', 'parent': 'port1', 'vlanid': 17},
    {'name': 'HUB2_DATA', 'vrf': vrf_data, 'ipmask': '192.168.2.10 255.255.255.254', 'parent': 'port2', 'vlanid': 25},
    {'name': 'HUB2_VOICE', 'vrf': vrf_voice, 'ipmask': '192.168.2.13 255.255.255.254', 'parent': 'port2', 'vlanid': 26},
    {'name': 'HUB2_VIDEO', 'vrf': vrf_video, 'ipmask': '192.168.2.15 255.255.255.254', 'parent': 'port2', 'vlanid': 27},
    ] %}

config system interface
    {% for vlan in vlans %}
    edit "{{vlan.name}}"
        set vdom "root"
        set type vlan
        set vrf {{vlan.vrf}}
        set ip {{vlan.ipmask}}
        set allowaccess ping
        config ipv6
            set ip6-address {{vlan.ipmask|ipv4_to_ipv6}}
            set ip6-allowaccess ping
        end
        set interface "{{vlan.parent}}"
        set vlanid {{vlan.vlanid}}
    next
    {% endfor %}
end

config router route-map
    edit "LAN_INTERFACES"
        set comments "Only advertise prefixes connected to LAN interfaces"
        config rule
            edit 10
                set match-interface "port5"
            next
            edit 11
                set match-interface "LAN_VOICE"
            next
            edit 12
                set match-interface "LAN_VIDEO"
            next
        end
    next
end

{%
    set neighbors = [
        { 'ip': '192.168.1.11', 'asn': 65001, 'interface': 'HUB1_DATA' },
        { 'ip': '192.168.1.12', 'asn': 65001, 'interface': 'HUB1_VOICE' },
        { 'ip': '192.168.1.14', 'asn': 65001, 'interface': 'HUB1_VIDEO' },
        { 'ip': '192.168.2.11', 'asn': 65002, 'interface': 'HUB2_DATA' },
        { 'ip': '192.168.2.12', 'asn': 65002, 'interface': 'HUB2_VOICE' },
        { 'ip': '192.168.2.14', 'asn': 65002, 'interface': 'HUB2_VIDEO' },
    ]
%}

config router bgp
    set as 65003
    set router-id 10.200.3.251
    set keepalive-timer 15
    set holdtime-timer 45
#     set ebgp-multipath enable
#     set ibgp-multipath enable
#     set recursive-next-hop enable
#     set recursive-inherit-priority enable
    set graceful-restart enable
    config neighbor
        {% for neighbor in neighbors %}
        edit "{{neighbor.ip}}"
            set activate-vpnv4 disable
            set activate-vpnv6 disable
            set activate-evpn disable
            set advertisement-interval 1
            set remote-as {{neighbor.asn}}
            set interface {{neighbor.interface}}
            set update-source {{neighbor.interface}}
            set capability-graceful-restart enable
            set next-hop-self enable
            set soft-reconfiguration enable
            set capability-graceful-restart6 enable
            set next-hop-self6 enable
            set soft-reconfiguration6 enable
        next
        {% endfor %}
    end
    config redistribute "connected"
        set status enable
        set route-map "LAN_INTERFACES"
    end
    config redistribute6 "connected"
        set status enable
        set route-map "LAN_INTERFACES"
    end
end

config firewall policy
    edit 1
        set name "ALLOW_ALL"
        set srcintf "any"
        set dstintf "any"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set srcaddr6 "all"
        set dstaddr6 "all"
        set schedule "always"
        set service "ALL"
        set logtraffic disable
    next
end

