{% if vrf_segmentation %}
{% extends "./routing.bgp.conf" %} {# shared jinja variables needed for BGP #}
{% block bgp_vrf %}
#
# VRF segmentation
#
# VRF {{vrf_pe}} is used as PE VRF to carry vpnv4 prefixes for the CE VRFs
# For VPNv4 RT we DO NOT use the local ASN, we use 65000 for all devices from all regions

# RD for Hubs
#
# 1064791/1069398 explains that using the same RD for two Hubs (in same region) is ok if they do not advertise the same subnet.
# If the two Hubs advertise the same subnet (eg, WEST-DC and WEST-DC2 learn common subnet 10.12.0.0/24 from DC) then,
# for such multi-homing setup, we must use different RDs for each Hub.
# As a generic and simple approach, this config uses different RDs per FGTs just in case the final setup happens to be
# multi-homed on any FGT. The RD is made of the device's loopback so that it is unique per device

# Advertise CE VRFs => simply add the CE VRF LAN interfaces to the LAN_INTERFACES route-map

# config router route-map
#     edit "LAN_INTERFACES"
#         config rule
#             {% for name, segment in vrf_segments.items() %}
#                 {% if name != "LAN" %}  {# skip the LAN interface since it is already defined in the RM #}
#                     edit "{{10+loop.index0}}"
#                         set match-interface "{{segment.alias}}"
#                         set set-tag 32768
#                     next
#                 {% endif %}
#             {% endfor %}
#             edit 20
#                 set match-interface "lo-RP-Voice"
#             next
#             edit 21
#                 set match-interface "lo-RP-Video"
#             next
#         end
#     next
# end

config router bgp
        {% if multicast %}
            config network
                edit 2
                    set prefix-name "lo-RP"
                next
            end
        {% endif %}

    config neighbor-group
        edit "EDGE"
            set soft-reconfiguration-vpnv4 enable
            set capability-graceful-restart-vpnv4 enable
            set route-reflector-client-vpnv4 enable
            set next-hop-self-vpnv4 enable
#             set route-map-out-vpnv4 "EDGE_OUT"
            set soft-reconfiguration-vpnv6 enable
            set capability-graceful-restart-vpnv6 enable
            set route-reflector-client-vpnv6 enable
            set next-hop-self-vpnv6 enable
#             set route-map-out-vpnv6 "EDGE_OUT"
        next
#         edit "EDGE"
#             set soft-reconfiguration-vpnv4 enable
#             set capability-graceful-restart-vpnv4 enable
#             set route-reflector-client-vpnv4 enable
#             set next-hop-self-vpnv4 enable
# #             set route-map-out-vpnv4 "EDGE_OUT"
#         next
#         edit "EDGEv6"
#             set soft-reconfiguration-vpnv6 enable
#             set capability-graceful-restart-vpnv6 enable
#             set route-reflector-client-vpnv6 enable
#             set next-hop-self-vpnv6 enable
# #             set route-map-out-vpnv6 "EDGE_OUT"
#         next
        edit "ADVPN_INTER_REGION"
            set soft-reconfiguration-vpnv4 enable
            set capability-graceful-restart-vpnv4 enable
            set next-hop-self-vpnv4 enable
            set route-map-out-vpnv4 "ADVPN_OUT"
            set soft-reconfiguration-vpnv6 enable
            set capability-graceful-restart-vpnv6 enable
            set next-hop-self-vpnv6 enable
            set route-map-out-vpnv6 "ADVPN_OUT"
        next
    end

    config neighbor
        {% for neighbor in neighbors -%}
            edit "{{neighbor.ip}}"
                set soft-reconfiguration-vpnv4 enable
                set capability-graceful-restart-vpnv4 enable
                set route-map-out-vpnv4 "FILTER_DEAD_BRANCHES"
                set next-hop-self-vpnv4 enable
                set soft-reconfiguration-vpnv6 enable
                set capability-graceful-restart-vpnv6 enable
                set route-map-out-vpnv6 "FILTER_DEAD_BRANCHES"
                set next-hop-self-vpnv6 enable
#                 set route-map-in-vpnv4 "REGION_IN"
#                 set route-map-out-vpnv4 "REGION_OUT"
#                 set route-map-in-vpnv6 "REGION_IN"
#                 set route-map-out-vpnv6 "REGION_OUT"
            next
        {% endfor %}
    end

    config vrf
        edit "{{vrf_pe}}"
            set role pe
        next

        {% for segment in vrf_segments.values() -%}
            {% if segment.vrfid != vrf_pe %}
                edit "{{segment.vrfid}}"
                    set role ce
                    set rd "{{loopback}}:{{segment.vrfid}}"
                    set export-rt "65000:{{segment.vrfid}}"
                    set import-rt "65000:{{segment.vrfid}}"
                next
            {% endif %}
        {% endfor %}
    end
    config vrf6
        edit "{{vrf_pe}}"
            set role pe
        next

        {% for segment in vrf_segments.values() -%}
            {% if segment.vrfid != vrf_pe %}
                edit "{{segment.vrfid}}"
                    set role ce
                    set rd "{{loopback}}:{{segment.vrfid}}"
                    set export-rt "65000:{{segment.vrfid}}"
                    set import-rt "65000:{{segment.vrfid}}"
                next
            {% endif %}
        {% endfor %}
    end

end

{% endblock %} {# end of extension of 'router.bgp.conf' #}
{% endif %} {# vrf_segmentation #}
