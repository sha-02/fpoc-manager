config router route-map
    edit "FILTER_DEAD_BRANCHES"
        set comments "Suppress all routes towards a spoke whose links are all dead"
        config rule
            edit 10
                set match-suppress enable
                set action deny
            next
            edit 20
            next
        end
    next
end

config router bgp
    set as {{local_ASN}}
    set router-id {{loopback}}
    set keepalive-timer 15
    set holdtime-timer 45
    set ibgp-multipath enable
    set ebgp-multipath enable
    set graceful-restart enable

    set recursive-next-hop enable
    set recursive-inherit-priority enable

    config neighbor-group
        edit "EDGE"
            set description "Peering to Edge Branches"
            set interface "lo-BGP"
            set update-source "lo-BGP"
            set remote-as {{local_ASN}}
            set advertisement-interval 1
            set soft-reconfiguration enable
            set capability-graceful-restart enable
            set route-reflector-client enable
            set next-hop-self enable
#             set route-map-out "EDGE_OUT"
            set soft-reconfiguration6 enable
            set capability-graceful-restart6 enable
            set route-reflector-client6 enable
            set next-hop-self6 enable
#             set route-map-out6 "EDGE_OUT"
        next
#         edit "EDGE"
#             set activate6 disable
#             set activate-vpnv6 disable
#             set description "v4 Peering to Edge Branches"
#             set interface "lo-BGP"
#             set update-source "lo-BGP"
#             set remote-as {{local_ASN}}
#             set advertisement-interval 1
#             set soft-reconfiguration enable
#             set capability-graceful-restart enable
# #             set route-map-out "EDGE_OUT"
#             set route-reflector-client enable
#             set next-hop-self enable
#         next
#         edit "EDGEv6"
#             set activate disable
#             set activate-vpnv4 disable
#             set activate-evpn disable
#             set description "v6 Peering to Edge Branches"
#             set interface "lo-BGP"
#             set update-source "lo-BGP"
#             set remote-as {{local_ASN}}
#             set advertisement-interval 1
#             set soft-reconfiguration6 enable
#             set capability-graceful-restart6 enable
# #             set route-map-out "EDGE_OUT"
#             set route-reflector-client6 enable
#             set next-hop-self6 enable
#         next
    end

    config neighbor-range
        edit 1
            set prefix 10.200.{{region_id}}.0 255.255.255.0
            set neighbor-group "EDGE"
        next
    end
#     config neighbor-range6
#         edit 1
#             set prefix6 2000:10:200:{{region_id}}::0/64
# #             set neighbor-group "EDGEv6"
#             set neighbor-group "EDGE"
#         next
#     end

    config network
        edit 1
            # the regional loopback aggregate (eg, 10.200.1.0/24) comes from a blackhole static route
            # if vrf_segmentation it is only advertised to the PE VRF
            set prefix-name "lo-BGP-regional-summary"
        next
    end
    config network6
        edit 1
            # the regional loopback aggregate (eg, 10.200.1.0/24) comes from a blackhole static route
            # if vrf_segmentation it is only advertised to the PE VRF
            set prefix6 2000:10:200:{{region_id}}::0/64
        next
    end

    # Advertise the LAN subnets
#     config redistribute "connected"
#         set status enable
#         set route-map "LAN_INTERFACES"
#     end

    # corporate summaries are *redistributed* in order to benefit the 'tag' added in the blackhole static route
#     config redistribute "static"
#         set status enable
#         set route-map "RFC1918_ONLY"
#     end
end

