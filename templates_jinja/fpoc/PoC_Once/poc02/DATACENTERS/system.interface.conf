###############################################################################################################
# Internet and OOB management interfaces

{% set textualize = { 1: 'first', 2: 'second'} %}
{% set wan_dc = datacenter[region|lower][textualize[dc_id]] %}

# On the Hubs, DO NOT use the same loopback for BGP termination and as a health-check server for the Spokes
# Using the same loopback is not supported, because the healh-check routes are statically injected on the Spokes,
# remaining even when the respective overlay is dead.
# As a result, the BGP session will not be able to switchover to another overlay upon failure!

config system interface
    edit "{{wan.inet1.port}}" {# for VLANs this is the parent interface # for non-vlans this is the physical interface #}
        {{ "set speed "~wan.inet1.speed if wan.inet1.speed }}
    next
    edit "{{wan.inet1.name}}"
        set vdom "root"
        set mode static
        set ip {{wan_dc.inet1.ipmask}}
        {% if wan.inet1.vlanid %}
            set type vlan
            set interface "{{wan.inet1.port}}"
            set vlanid {{wan.inet1.vlanid}}
        {% else %}
            set alias "{{wan.inet1.alias}}"
        {% endif %}
        set allowaccess ping
        set role wan
#         set estimated-upstream-bandwidth 100000
#         set estimated-downstream-bandwidth 100000
#         set monitor-bandwidth enable
    next
    edit "{{wan.inet2.port}}" {# for VLANs this is the parent interface # for non-vlans this is the physical interface #}
        {{ "set speed "~wan.inet2.speed if wan.inet2.speed }}
    next
    edit "{{wan.inet2.name}}"
        set vdom "root"
        set mode static
        set ip {{wan_dc.inet2.ipmask}}
        {% if wan.inet2.vlanid %}
            set type vlan
            set interface "{{wan.inet2.port}}"
            set vlanid {{wan.inet2.vlanid}}
        {% else %}
            set alias "{{wan.inet2.alias}}"
        {% endif %}
        set allowaccess ping
        set role wan
#         set estimated-upstream-bandwidth 100000
#         set estimated-downstream-bandwidth 100000
#         set monitor-bandwidth enable
    next
    edit "{{wan.inet3.port}}" {# for VLANs this is the parent interface # for non-vlans this is the physical interface #}
        {{ "set speed "~wan.inet3.speed if wan.inet3.speed }}
    next
    edit "{{wan.inet3.name}}"
        set vdom "root"
        set mode static
        set ip {{wan_dc.inet3.ipmask}}
        {% if wan.inet3.vlanid %}
            set type vlan
            set interface "{{wan.inet3.port}}"
            set vlanid {{wan.inet3.vlanid}}
        {% else %}
            set alias "{{wan.inet3.alias}}"
        {% endif %}
        set allowaccess ping
        set role wan
#         set estimated-upstream-bandwidth 6000
#         set estimated-downstream-bandwidth 6000
#         set monitor-bandwidth enable
    next
#     edit "{{lan.port}}"
#         set vdom "root"
#         set mode static
#         set ip {{lan.ip}} {{lan.mask}}
#         set allowaccess ping
#         set alias "{{lan.alias}}"
#         {{ "set speed "~lan.speed if lan.speed }}
#         set role lan
#         set monitor-bandwidth enable
#     next
    edit "lo-HC"
        set vdom "root"
        set ip 10.200.{{region_id}}.254 255.255.255.255
        set allowaccess ping
        config ipv6
            set ip6-address 2000:10:200:{{region_id}}::254/128
            set ip6-allowaccess ping
        end
        set type loopback
        set role wan
    next
    edit "lo-BGP"
        set vdom "root"
        set ip {{loopback}} 255.255.255.255
        set allowaccess ping
        config ipv6
            set ip6-address {{loopback|ipv4_to_ipv6}}/128
            set ip6-allowaccess ping
        end
        set type loopback
        set role wan
    next
end

