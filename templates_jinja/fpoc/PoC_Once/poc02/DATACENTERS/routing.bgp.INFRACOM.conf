# "set attribute-unchanged med": keep MED when advertising to an eBGP peer

{%
    set neighbors = [
        { 'ip': '192.168.'~region_id~'.10', 'interface': 'DATA' },
        { 'ip': '192.168.'~region_id~'.13', 'interface': 'VOICE' },
        { 'ip': '192.168.'~region_id~'.15', 'interface': 'VIDEO' },
    ]
%}

config router bgp
    config neighbor
        {% for neighbor in neighbors %}
        edit "{{neighbor.ip}}"
            set description "Peering to INFRACOM for VRF {{neighbor.interface}}"
            set activate-vpnv4 disable
            set activate-vpnv6 disable
            set activate-evpn disable
            set advertisement-interval 1
            set soft-reconfiguration enable
            set soft-reconfiguration6 enable
            set capability-graceful-restart enable
            set capability-graceful-restart6 enable
            set remote-as 65003
            # set route-map-in "SET_LAN_TAG"
#             set route-map-out "CORE_OUT"
            set route-map-out "FILTER_DEAD_BRANCHES"
            set route-map-out6 "FILTER_DEAD_BRANCHES"
#            set attribute-unchanged med
            set connect-timer 1
            set interface "{{neighbor.interface}}"
            set update-source "{{neighbor.interface}}"
        next
        {% endfor %}
    end
end

{% endblock %} {# end of extension of 'router.bgp.conf' #}