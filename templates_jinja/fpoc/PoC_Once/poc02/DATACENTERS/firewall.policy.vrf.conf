{% if vrf_segmentation %}
# Update FW addresses and groups for VRFs

# zone regrouping all LAN VRFs for overlay/corporate traffic
{% set zone_members = [] -%}
{% for segment in vrf_segments.values() -%}
    {% do zone_members.append(segment.name) -%}
{% endfor -%}

config system zone
    edit "INFRACOM"
#        set description "DC segments"
        set interface {{zone_members|join(' ')}}
    next
end

{% if multicast %}
    config firewall policy
        edit 1000
            set name "BGP SDWAN.HC PIM"
            set srcintf "any"
            set dstintf "any"
            set srcaddr "all"
            set srcaddr6 "all"
            append dstaddr "lo-RP"
        next
    end
{% endif %}

{% if dia or sia %}

# zone regrouping all lanVRF-wanVRF links terminated on the LAN VRFs
{% set zone_members = [] -%}
{% for name, vrflink_endpoints in inter_segments.items() -%}
    {% if vrflink_endpoints.1.vrfid != vrf_wan %}
        {% do zone_members.append(name+'1') -%}
    {% endif %}
{% endfor -%}

config system zone
   edit "INTERNET_"
        set description "Internet-facing side of the CE VRFs"
        set interface {{zone_members|join(' ')}}
   next
end

# zone regrouping all lanVRF-wanVRF links terminated on the WAN VRF
{% set zone_members = [] -%}
{% for name, vrflink_endpoints in inter_segments.items() -%}
    {% if vrflink_endpoints.1.vrfid != vrf_wan %}
        {% do zone_members.append(name+'0') -%}
    {% endif %}
{% endfor -%}

config system zone
    edit "LAN_"
        set description "LAN-facing side of the Internet VRF"
        set interface {{zone_members|join(' ')}}
    next
end

config firewall policy
    edit 1 {# "Deny Internet" #}
        set srcintf "LAN_"
    next
    edit 2  {# "Internet" #}
        append srcintf "LAN_"
        append dstintf "INTERNET_"
    next
    {% if ria %}
    edit 3 {# RIA #}
        set dstintf "INTERNET_"
    next
    {% endif %}
end
{% endif %} {# DIA/SIA #}

{% endif %} {# VRF segmentation #}