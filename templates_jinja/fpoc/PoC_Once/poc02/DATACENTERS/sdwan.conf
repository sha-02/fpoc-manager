###############################################################################################################

{% if region == 'West' %}
    {% set REMOTE_REGION = "REGION2" %}
    {% set REMOTE_HUB = "HUB2" %}
{% else %}
    {% set REMOTE_REGION = "REGION1" %}
    {% set REMOTE_HUB = "HUB1" %}
{% endif %}

##### SD-WAN zones -----------------------------------------------

config system sdwan
    set status enable
    config zone
        edit "INTERNET"
        next
        edit "BRANCHES"
        next
        edit {{ REMOTE_REGION }}
        next
    end
end

##### SD-WAN members -----------------------------------------------

config system sdwan
    config members
        edit 1
            set interface "EDGE_INET1"
            set zone "BRANCHES"
        next
        edit 2
            set interface "EDGE_INET2"
            set zone "BRANCHES"
        next
        edit 3
            set interface "EDGE_INET3"
            set zone "BRANCHES"
        next
        edit 4
            set interface "{{wan.inet1.name}}"
            {{ "set gateway %s.254"%(wan.inet1.subnet) if not wan.inet1.dhcp }}
            set zone "INTERNET"
        next
        edit 5
            set interface "{{wan.inet2.name}}"
            {{ "set gateway %s.254"%(wan.inet2.subnet) if not wan.inet2.dhcp }}
            set zone "INTERNET"
        next
        edit 6
            set interface "{{wan.inet3.name}}"
            {{ "set gateway %s.254"%(wan.inet3.subnet) if not wan.inet3.dhcp }}
            set zone "INTERNET"
        next
        edit 11
            set interface {{REMOTE_HUB}}_INET1
            set zone {{ REMOTE_REGION }}
            set transport-group 1
        next
        edit 22
            set interface {{REMOTE_HUB}}_INET2
            set zone {{ REMOTE_REGION }}
            set transport-group 1
        next
        edit 33
            set interface {{REMOTE_HUB}}_INET3
            set zone {{ REMOTE_REGION }}
            set transport-group 1
        next
        {% if full_mesh_ipsec %}
            edit 12
                set interface "HUB2_INET1X2"
                set zone {{ REMOTE_REGION }}
                set transport-group 1
            next
            edit 21
                set interface "HUB2_INET2X1"
                set zone {{ REMOTE_REGION }}
                set transport-group 1
            next
        {% endif %}
    end
end

### SD-WAN health-checks -----------------------------------------------

config system sdwan
    config health-check
        {% if dia or sia %}
        edit "SLA_Internet"
            set server "198.18.8.8"
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            set members 4 5
            config sla
                edit 1
                    set latency-threshold 150
                    set jitter-threshold 30
                    set packetloss-threshold 2
                next
            end
        next
        {% endif %}
        edit "SLA_EDGE"
            set detect-mode remote

            # failtime * remote-probe-timeout = amount of time (in ms) the hub waits, without receiving SLA probes,
            # before switching the link to dead state
            # We recommend to nullify 'failtime' by setting it to 1
            set remote-probe-timeout 1000
            set failtime 1

            # interval = how often (milliseconds) the hub checks the status of the health check.
            # To avoid potential false-positives, it is set to 250ms which is 1/4 of the remote-probe-timeout
            # so 4 remote-sla must be missing for the spoke to be considered dead
            # Do not set below 200ms in large environments – can cause CPU issues.
            set interval 250
            # interval * recoverytime = amount of time (in ms) the hub waits, upon receiving SLA probes,
            # before switching back the link to alive state
            # Here,  10 seconds (250ms * 40)
            # It is recommended to set a recovery time higher than the desired convergence time to avoid route flaps
            set recoverytime 40

            # When all SLA health-check members for a Spoke are in dead state, the corresponding BGP prefixes are
            # marked as suppressible. Suppressible BGP prefixes can be matched by a route-map where they can be
            # suppressed (BGP withdrawn) or their BGP attributes can be changed (MED, AS-Path,...)
            set update-bgp-route enable

            set sla-id-redistribute 1
            set members 1 2 3
            config sla
                edit 1
                    set link-cost-factor remote
                    # sets the highest priority (lowest preference) when no remote-sla is received from Branch
                    # This does not override the spoke’s advertised priority. As long as the spoke’s probes are received,
                    # the Hub will always use whatever value the spoke tells it to.
                    set priority-out-sla 65535
                next
            end
        next
        edit "SLAv6_EDGE"
            set addr-mode ipv6
            set detect-mode remote
            set remote-probe-timeout 1000
            set failtime 1
            set interval 250
            set recoverytime 40
            set update-bgp-route enable
            set sla-id-redistribute 1
            set members 1 2 3
            config sla
                edit 1
                    set link-cost-factor remote
                    set priority-out-sla 65535
                next
            end
        next
    end
end

### SD-WAN with ADVPN v2.0 -----------------------------------------------

config system sdwan
    config health-check
        delete "Default_DNS"
        delete "Default_Office_365"
        delete "Default_Gmail"
        delete "Default_Google Search"
        delete "Default_FortiGuard"
        # For cross-regional branch-to-remoteRegionHub shortcuts
        edit SLA_{{REMOTE_REGION}}
            set server {{ "10.200.2.254" if region == 'West' else "10.200.1.254" }}
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            {{ "set vrf "~vrf_pe if vrf_segmentation }}
            set source {{ "10.200.1.254" if region == 'West' else "10.200.2.254" }}
            {% if full_mesh_ipsec %}
                set members {{ "11 12 22 21 33" if region == 'West' else "111 112 122 121 133 211 212 222 221 233" }}
            {% else %}
                set members 11 22 33
            {% endif %}
            config sla
                edit 1
                    set latency-threshold 150
                    set jitter-threshold 30
                    set packetloss-threshold 2
                next
            end
        next
        edit SLAv6_{{REMOTE_REGION}}
            set addr-mode ipv6
            set server {{ "10.200.2.254"|ipv4_to_ipv6 if region == 'West' else "10.200.1.254"|ipv4_to_ipv6 }}
            set sla-fail-log-period 10
            set sla-pass-log-period 10
            {{ "set vrf "~vrf_pe if vrf_segmentation }}
            set source6 {{ "10.200.1.254"|ipv4_to_ipv6 if region == 'West' else "10.200.2.254"|ipv4_to_ipv6 }}
            {% if full_mesh_ipsec %}
                set members {{ "11 12 22 21 33" if region == 'West' else "111 112 122 121 133 211 212 222 221 233" }}
            {% else %}
                set members 11 22 33
            {% endif %}
            config sla
                edit 1
                    set latency-threshold 150
                    set jitter-threshold 30
                    set packetloss-threshold 2
                next
            end
        next
    end
    config zone
        edit {{ REMOTE_REGION }}
            set advpn-select enable
            set advpn-health-check SLA_{{REMOTE_REGION}}
        next
    end
end

### SD-WAN rules -----------------------------------------------

config system sdwan
    config service
        #
        # HUB->BR SDWAN steering to intra-regional Branches
        #
        # Multiple ECMP BGP routes with priorities can exist to reach a Branch
        # We can use sd-wan rules to select whichever overlay we want to use
        # When an overlay is bad, its priority gets increased and this route/overlay is no longer eligible due to 'fib-best-match'
        # The combination of 'fib-best-match' and 'BGP priorities' provide same result as 'mode sla' rule with active probes
#         edit 19
#             set name "EDGE_VoIP"
#             set mode manual
#             set src "DataCenters"
#             set dst "Corporate"
#             set protocol 17
#             set start-port 5061
#             set end-port 5061
#             set priority-members 3 1 2
#             set tie-break fib-best-match
#         next
        edit 20
            set name "EDGE"
            set mode manual
            set src "Corporate"
            set dst "Corporate"
            set priority-members 1 2 3
            set tie-break fib-best-match
        next
        edit 21
            set name "EDGE_6"
            set addr-mode ipv6
            set mode manual
            set src6 "Corporate"
            set dst6 "Corporate"
            set priority-members 1 2 3
            set tie-break fib-best-match
        next
        #
        # inter-regional steering: LAN->HUB->HUB->BR or BR->HUB->HUB->LAN
        #
        edit 22
            set name "{{REMOTE_REGION}}"
            set mode sla
            set src "Corporate"
            set dst "Corporate"
            config sla
                edit SLA_{{REMOTE_REGION}}
                    set id 1
                next
            end
            set priority-zone {{ REMOTE_REGION }}
        next
        edit 23
            set name "{{REMOTE_REGION}}_6"
            set addr-mode ipv6
            set mode sla
            set src6 "Corporate"
            set dst6 "Corporate"
            config sla
                edit SLAv6_{{REMOTE_REGION}}
                    set id 1
                next
            end
            set priority-zone {{ REMOTE_REGION }}
        next
        {% if dia or sia %}
        #
        # Internet steering: DIA from DC itself or RIA from Branches
        #
        edit 30
            set name "Internet"
            set mode sla
            set src "Corporate"
            # Restrict the dst to 'Internet' ('all' minus RFC1918 subnets) (defined in bootstrap config)
            # to ensure that this rule never catch anything else that traffic for Internet
            set dst "Internet"
            config sla
                edit "SLA_Internet"
                    set id 1
                next
            end
            set priority-members 4 5
        next
        {% endif %}
    end
end
