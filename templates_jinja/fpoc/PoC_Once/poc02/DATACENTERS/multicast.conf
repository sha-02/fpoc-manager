{% if multicast %}
###############################################################################################################
# Multicast

config system settings
    set multicast-forward disable
    set multicast-ttl-notchange enable
    set gui-multicast-policy enable
end

# Inter-Regional tunnels

{% set edge_tunnels = [ 'EDGE_INET1', 'EDGE_INET2', 'EDGE_INET3' ] %}

{% if region == 'West' %}
    {% set regional_tunnels = [ 'HUB2_INET1', 'HUB2_INET2', 'HUB2_INET3' ] %}
    {% set pim_interface = 'VOICE' %}
{% else %} {# East region #}
    {% set regional_tunnels = [ 'HUB1_INET1', 'HUB1_INET2', 'HUB1_INET3' ] %}
    {% set pim_interface = 'VIDEO' %}
{% endif %}

# PIM-SM is enabled on:
# - port5 because this is where the mcast senders are located
# - lo-BGP because it is where the RP address is defined
# - Edge tunnels towards the Branches
# - the inter-regional tunnels because inter-regional multicast is allowed

config router multicast
    set multicast-routing enable
    config interface
        edit "lo-BGP"
            set pim-mode sparse-mode
        next
        {% if multicast and vrf_segmentation %}
            edit "lo-RP-Voice"
                set pim-mode sparse-mode
            next
            edit "lo-RP-Video"
                set pim-mode sparse-mode
            next
        {% endif %}
        edit "{{pim_interface}}" {# towards INFRACOM #}
            set pim-mode sparse-mode
        next
        {% for edge_tunnel in edge_tunnels %}
            edit "{{edge_tunnel}}"
                set pim-mode sparse-mode
                {{ "set update-source lo-BGP" if overlay == 'no_ip' }}
            next
        {% endfor %}
        {% for regional_tunnel in regional_tunnels %}
            edit "{{regional_tunnel}}"
                set pim-mode sparse-mode
                {{ "set update-source lo-BGP" if overlay == 'no_ip' }}
            next
        {% endfor %}
    end
end

config firewall multicast-policy
    edit 1
        set name "permit all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
    next
end

# Each DC is rendez-vous point for a set of multicast groups
# HUB1 for mcast groups in 239.1.1.0/24
# HUB2 for mcast groups in 239.2.1.0/24
# The generic convention is 239.<region-id>.(dc-number).0/24

config router multicast
    config pim-sm-global-vrf
        edit {{vrf_voice}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['HUB1']}}
                    set group "multicast-voice"
                next
            end
        next
        edit {{vrf_video}}
            config rp-address
                edit 1
                    set ip-address {{rendezvous_points['HUB2']}}
                    set group "multicast-video"
                next
            end
        next
    end
end
{% endif %}
