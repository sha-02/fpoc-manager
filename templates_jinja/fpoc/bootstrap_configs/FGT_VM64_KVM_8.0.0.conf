config system auto-script
    edit "monitor-system"
        set interval 300
        set repeat 100
        set script "fnsysctl date
        get system perf stat
        diag sys session stat
        diag sys session6 stat
        diag sys vd list
        diag sys cmdb info
        get sys ha status
        diag test app hasync 50
        diag sys top 2 30 5
        diag sys mpstat 2 5
        diag sys profile report
        fnsysctl ps"
        set output-size 20
    next
    edit "monitor-memory"
        set interval 300
        set repeat 0
        set script "fnsysctl date
        diag hardware sysinfo memory
        diag hardware sysinfo slab
        diag sys top-mem 10
        diag sys top-fd 10
        fnsysctl df -k
        fnsysctl du -i /tmp
        fnsysctl du -a /tmp
        fnsysctl du -a / -d 1
        fnsysctl du -i /dev/shm
        fnsysctl du -a /dev/shm
        fnsysctl du /node-scripts"
        set output-size 20
    next
end
