{# Useful aliases #}

config system alias
    edit "rib"
        set command "get router info routing-table all"
    next
    edit "rib_database"
        set command "get router info routing-table database"
    next
    edit "fib"
        set command "get router info kernel"
    next
    edit "proute"
        set command "diag firewall proute list"
    next
    edit "ipsec_tunnel"
        set command "diag vpn tunnel list"
    next
    edit "ipsec_gateway"
        set command "diag vpn ike gateway list"
    next
    edit "ipsec_peering"
        set command "diag vpn ike gateway list | grep \'name\\| peer-id:\'"
    next
    edit "bgp_summary"
        set command "get router info bgp summary"
    next
    edit "bgp_network"
        set command "get router info bgp network"
    next
    edit "bgp_rib"
        set command "get router info routing-table bgp"
    next
    edit "sdwan_advpn"
        set command "diag sys sdwan advpn-session"
    next
    edit "sdwan_member"
        set command "diag sys sdwan member"
    next
    edit "sdwan_zone"
        set command "diag sys sdwan zone"
    next
    edit "sdwan_healthcheck"
        set command "diag sys sdwan health-check status"
    next
    edit "sdwan_rule"
        set command "diag sys sdwan {{ "service4" if FOS >= 7_004_004 else "service" }}"
    next
    edit "sdwan_service"
        set command "diag sys sdwan {{ "service4" if FOS >= 7_004_004 else "service" }}"
    next
    edit "sdwan_appcrtl"
        set command "diag sys sdwan internet-service-app-ctrl-list"
    next
    edit "sdwan_neighbor"
        set command "diag sys sdwan neighbor"
    next
    edit "sdwan_route"
        set command "diag sys sdwan route"
    next

{% if ospf|default(false) %}
     edit "ospf_status"
         set command "get router info ospf status"
     next
     edit "ospf_neighbor"
         set command "get router info ospf neighbor"
     next
     edit "ospf_lsdb"
         set command "get router info ospf database brief"
     next
     edit "ospf_rib"
         set command "get router info routing-table ospf"
     next
     edit "ospf_interface"
         set command "get router info ospf interface"
     next
{% endif %}

{% if ipv6|default(false) %}
    edit "rib6"
        set command "get router info6 routing-table"
    next
    edit "rib6_database"
        set command "get router info6 routing-table database"
    next
    edit "fib6"
        set command "get router info6 kernel"
    next
    edit "proute6"
        set command "diag firewall proute6 list"
    next
    edit "bgp_summary6"
        set command "get router info6 bgp summary"
    next
    edit "bgp_network6"
        set command "get router info6 bgp network"
    next
    edit "bgp_rib6"
        set command "get router info6 routing-table bgp"
    next
{% endif %}

{% if vpnv4|default(false) %}
    edit "vpnv4_summary"
        set command "get router info bgp vpnv4 summary"
    next
    edit "vpnv4_network"
        set command "get router info bgp vpnv4 network"
    next
    {% for vrf in vrfs|default(false) %}
        edit "vrf_{{vrf.0}}_rib"
            set command "get router info routing-table all vrf {{vrf.1}}"
        next
        edit "vpnv4_vrf_{{vrf.0}}"
            set command "get router info bgp vpnv4 vrf {{vrf.1}}"
        next
    {% endfor %}
{% endif %}

{% if vpnv4|default(false) %}
    edit "vpnv6_summary"
        set command "get router info6 bgp vpnv6 summary"
    next
    edit "vpnv6_network"
        set command "get router info6 bgp vpnv6 network"
    next
    {% for vrf in vrfs|default(false) %}
        edit "vrf_{{vrf.0}}_rib6"
            set command "get router info6 routing-table vrf {{vrf.1}}"
        next
        edit "vpnv6_vrf_{{vrf.0}}"
            set command "get router info6 bgp vpnv6 vrf {{vrf.1}}"
        next
    {% endfor %}
{% endif %}

{% if evpn|default(false) %}
    edit "evpn_instance"
        set command "get l2vpn evpn instance"
    next
    edit "evpn_table"
        set command "get l2vpn evpn table"
    next
    edit "evpn_context"
        set command "get router info bgp evpn context"
    next
    edit "evpn_summary"
        set command "get router info bgp evpn summary"
    next
    edit "evpn_network"
        set command "get router info bgp evpn network"
    next
{% endif %}

{% if multicast|default(false) %}
    edit "pim_interface"
        set command "get router info multicast pim sparse-mode interface"
    next
    edit "pim_neighbor"
        set command "get router info multicast pim sparse-mode neighbor"
    next
    edit "pim_bsr"
        set command "get router info multicast pim sparse-mode bsr-info"
    next
    edit "pim_rp"
        set command "get router info multicast pim sparse-mode rp-mapping"
    next
    edit "pim_nh"
        set command "get router info multicast pim sparse-mode next-hop"
    next
    {% for mc in mcgroups|default(false) %}
        edit "pim_table_{{mc.0}}"
            set command "get router info multicast pim sparse-mode table {{mc.1}}"
        next
    {% endfor %}
    edit "igmp_interface"
        set command "get router info multicast igmp interface"
    next
    edit "igmp_groups"
        set command "get router info multicast igmp groups"
    next
    edit "igmp_limit"
        set command "diagnose ip multicast get-igmp-limit"
    next
    edit "mcast_status"
        set command "diag ip multicast status"
    next
    edit "mcast_table"
        set command "get router info multicast table"
    next
    edit "mcast_tablecount"
        set command "get router info multicast table-count"
    next
    edit "mcast_route"
        set command "diag ip multicast mroute"
    next
    edit "mcast_vif"
        set command "diag ip multicast vif"
    next
    edit "mcast_vif"
        set command "diag ip multicast vif"
    next
    edit "mcast_group_membership"
        set command "diag ip multicast group-membership"
    next
{% endif %}

end
